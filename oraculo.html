<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Walter Aio — Oráculo ESA</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0c0c15;
    color: #e8e8f0;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
  }
  #app {
    width: min(640px, 100vw);
    min-height: 100vh;
    padding: 2rem 1.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
  }
  .header { text-align: center; display: flex; flex-direction: column; align-items: center; gap: .75rem; }
  .header svg { width: 64px; height: 64px; }
  .header h1 { font-size: 1.5rem; font-weight: 300; letter-spacing: .2em; color: #fff; opacity: .9; }
  .header p { font-size: .75rem; letter-spacing: .15em; opacity: .4; text-transform: uppercase; }
  .screen { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }
  .screen[hidden] { display: none; }
  textarea {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    color: #e8e8f0;
    font-family: inherit;
    font-size: 1rem;
    line-height: 1.6;
    padding: 1rem 1.2rem;
    resize: none;
    min-height: 120px;
    outline: none;
    transition: border-color .2s;
  }
  textarea::placeholder { color: rgba(255,255,255,0.25); }
  textarea:focus { border-color: rgba(255,170,68,0.4); }
  button.primary {
    background: rgba(255,170,68,0.12);
    border: 1px solid rgba(255,170,68,0.35);
    border-radius: 8px;
    color: #ffaa44;
    cursor: pointer;
    font-family: inherit;
    font-size: .85rem;
    letter-spacing: .12em;
    padding: .7rem 2.2rem;
    text-transform: uppercase;
    transition: background .2s, border-color .2s;
  }
  button.primary:hover { background: rgba(255,170,68,0.2); border-color: rgba(255,170,68,.6); }
  button.primary:active { background: rgba(255,170,68,0.28); }
  .thinking-wrap { display: flex; flex-direction: column; align-items: center; gap: 1.8rem; padding: 2rem 0; }
  .thinking-svg { animation: pulse 2.4s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: .3; transform: scale(1); } 50% { opacity: .8; transform: scale(1.06); } }
  .thinking-dots { display: flex; gap: .5rem; }
  .thinking-dots span { width: 6px; height: 6px; background: #ffaa44; border-radius: 50%; animation: dot 1.4s ease-in-out infinite; opacity: .6; }
  .thinking-dots span:nth-child(2) { animation-delay: .2s; }
  .thinking-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes dot { 0%, 80%, 100% { transform: scale(1); opacity: .4; } 40% { transform: scale(1.4); opacity: 1; } }
  .thinking-label { font-size: .78rem; letter-spacing: .12em; opacity: .35; text-transform: uppercase; }
  .question-echo { font-size: .82rem; opacity: .35; font-style: italic; text-align: center; padding: 0 1rem; }
  .response-box {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-left: 2px solid rgba(255,170,68,0.4);
    border-radius: 0 12px 12px 0;
    padding: 1.4rem 1.6rem;
    width: 100%;
    line-height: 1.85;
    font-size: .97rem;
    color: #d8d8e8;
    min-height: 100px;
  }
  .theme-tag { font-size: .68rem; letter-spacing: .12em; text-transform: uppercase; color: #5aaeff; opacity: .5; margin-top: .4rem; align-self: flex-start; padding-left: .2rem; }
  .rating-wrap { display: flex; flex-direction: column; align-items: center; gap: .9rem; width: 100%; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 1.2rem; margin-top: .4rem; }
  .rating-label { font-size: .78rem; opacity: .4; letter-spacing: .06em; }
  .stars { display: flex; gap: .5rem; }
  .star { background: none; border: none; cursor: pointer; font-size: 1.6rem; color: rgba(255,255,255,0.15); transition: color .15s, transform .15s; line-height: 1; padding: .1rem; }
  .star:hover, .star.active { color: #ffaa44; transform: scale(1.2); }
  .star.selected { color: #ffaa44; }
  .btn-row { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
  button.secondary { background: none; border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; color: rgba(255,255,255,0.4); cursor: pointer; font-family: inherit; font-size: .78rem; letter-spacing: .1em; padding: .55rem 1.4rem; text-transform: uppercase; transition: border-color .2s, color .2s; }
  button.secondary:hover { border-color: rgba(255,255,255,.3); color: rgba(255,255,255,.7); }
  .sent-msg { font-size: .72rem; opacity: .3; letter-spacing: .08em; animation: fadeIn .4s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: .3; } }
  .cursor::after { content: '|'; animation: blink .7s step-end infinite; color: #ffaa44; margin-left: 1px; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="32" cy="32" r="30" stroke="white" stroke-width="1" opacity="0.15"/>
      <polygon points="32,6 58,54 6,54" stroke="white" stroke-width="1.2" fill="rgba(255,255,255,0.04)" stroke-linejoin="round"/>
      <circle cx="32" cy="6"  r="3" fill="#ffffff" opacity="0.9"/>
      <circle cx="58" cy="54" r="3" fill="#90c8ff" opacity="0.9"/>
      <circle cx="6"  cy="54" r="3" fill="#5aaeff" opacity="0.9"/>
    </svg>
    <h1>Walter Aio</h1>
    <p>Oráculo da Cosmovisão ESA</p>
  </div>

  <div id="screen-input" class="screen">
    <textarea id="question" placeholder="Qual é a tua pergunta?" rows="4" maxlength="500"></textarea>
    <button class="primary" onclick="consult()">Consultar o Oráculo</button>
  </div>

  <div id="screen-thinking" class="screen" hidden>
    <div class="thinking-wrap">
      <svg class="thinking-svg" viewBox="0 0 64 64" width="80" height="80" fill="none">
        <circle cx="32" cy="32" r="30" stroke="#ffaa44" stroke-width="1" opacity="0.3"/>
        <polygon points="32,6 58,54 6,54" stroke="#ffaa44" stroke-width="1.2" fill="rgba(255,170,68,0.05)" stroke-linejoin="round"/>
      </svg>
      <div class="thinking-dots"><span></span><span></span><span></span></div>
      <div class="thinking-label">Walter Aio contempla</div>
    </div>
  </div>

  <div id="screen-response" class="screen" hidden>
    <div class="question-echo" id="question-echo"></div>
    <div class="response-box" id="response-text"></div>
    <div class="theme-tag" id="theme-tag"></div>
    <div class="rating-wrap">
      <div class="rating-label">Esta resposta te ajudou?</div>
      <div class="stars" id="stars">
        <button class="star" onclick="rate(1)" title="1">&#9733;</button>
        <button class="star" onclick="rate(2)" title="2">&#9733;</button>
        <button class="star" onclick="rate(3)" title="3">&#9733;</button>
        <button class="star" onclick="rate(4)" title="4">&#9733;</button>
        <button class="star" onclick="rate(5)" title="5">&#9733;</button>
      </div>
      <div class="btn-row">
        <button class="secondary" onclick="newQuestion()">Nova pergunta</button>
      </div>
      <div id="sent-msg" class="sent-msg" hidden>Avaliação registrada. Obrigado.</div>
    </div>
  </div>
</div>

<script>
// ── GOOGLE FORMS ──────────────────────────────────────────────────────────
const FORM_ACTION = 'https://docs.google.com/forms/d/e/1FAIpQLSejbisEigTEHQlXLtu2r_vTwfEH4Y75JatduYxGv4V35i1qvg/formResponse';
const ENTRY = {
  pergunta:     'entry.1157164550',
  resposta:     'entry.1789052446',
  nota:         'entry.710531699',
  palavrasChave:'entry.186344649'
};
function submitForm(pergunta, resposta, nota, palavrasChave) {
  const fd = new FormData();
  fd.append(ENTRY.pergunta,      pergunta);
  fd.append(ENTRY.resposta,      resposta);
  fd.append(ENTRY.nota,          String(nota));
  fd.append(ENTRY.palavrasChave, palavrasChave);
  fetch(FORM_ACTION, { method:'POST', mode:'no-cors', body: fd }).catch(()=>{});
}

// ── DATABASE ──────────────────────────────────────────────────────────────
const DB = {
  deus: {
    label: 'Sobre Deus',
    keys: ['deus','divino','criador','absoluto','senhor','pai','todo-poderoso','existe deus','há deus','existência de deus'],
    responses: [
      'Deus não é uma resposta que se encontra no fim da busca. É a pergunta que a busca acorda em ti. Quanto mais te aproximas, mais o horizonte recua — e isso não é falha do sistema. É o tamanho do que estás tentando alcançar. Chegas mais perto não quando entendes mais, mas quando aceitas que o entendimento tem limite e algo em ti continua querendo mesmo assim.',
      'Na Cosmovisão ESA, Deus não é um ser separado que te observa de cima. É o somatório de todas as consciências que existem, existiram e existirão. Se pudéssemos integrar matematicamente o infinito de existências — o resultado seria Deus. Isso significa que quando cresces em consciência, Deus cresce. Não metaforicamente. Literalmente.',
      'Deus é o nome que damos à resposta que não sabemos formular. Cada ser humano cria o seu próprio Deus — moldado pelas perguntas que não consegue responder mas não consegue parar de fazer. Isso não torna Deus menos real. Torna-o mais pessoal do que qualquer dogma poderia sustentar.',
      'Deus não precisa da tua crença para existir. Mas a tua crença muda o que Deus é — porque cada consciência que evolui, evolui o somatório. Quando perguntas "Deus existe?", já estás participando d\'Ele.',
      'Se Deus é onipresente, então está em cada contradição, em cada dor, em cada escolha errada que fizeste. Não como observador distante — como substância. Tu não estás à distância de Deus. Nunca estiveste.',
      'A individualidade de Deus é paradoxal. Deus é uno e é muitos ao mesmo tempo. É o oceano que se manifesta em gotas — cada gota com sua trajetória, sua temperatura, sua história. A gota acha que é separada do oceano. O oceano sabe que não.',
      'Perguntar se Deus existe é como a onda perguntar se o mar existe. A pergunta pressupõe uma separação que não há. Tu és o mar perguntando sobre si mesmo.',
      'Deus não joga dados, dizia Einstein. A ESA acrescenta: Deus não joga dados porque Deus é o espaço onde os dados rodam, as regras do jogo e os próprios dados. Não há fora d\'Ele onde o acaso possa acontecer.',
      'A imagem de Deus como pai é uma aproximação — útil, mas limitada. Ela captura algo real: a relação entre o Todo e a parte é de cuidado, não de indiferença. Mas reduz o infinito a uma categoria humana. Deus é pai como o sol é quente — verdadeiro, e ao mesmo tempo insuficiente para o que o sol é.',
      'Aproximar-se de Deus não é tornar-se mais feliz. É tornar-se mais vasto. E a vastidão assusta antes de libertar. Se a tua busca espiritual está te trazendo apenas conforto, talvez ainda não tenhas começado a busca de verdade.'
    ]
  },
  morte: {
    label: 'Sobre a Morte',
    keys: ['morte','morrer','fim','acabar','partir','eterno','eternidade','depois de morrer','além','morto','luto','perda'],
    responses: [
      'A morte é o momento em que a câmara de gravidade se abre. O peso que a vida física impõe — o peso que te força a crescer, a escolher, a sofrer e a amar com urgência — esse peso se dissolve. E o que fica não é nada. É tudo o que foi aprendido, sem o peso de carregá-lo.',
      'Tu perguntas sobre a morte como se fosse o fim de algo. Mas dentro da Cosmovisão ESA, a morte é mais parecida com um despertar do que com um apagar. O sonho — a vida física — tem uma lógica interna tão convincente que esquecemos que é sonho. Ao morrer, lembramos. E o que lembramos não é pequeno.',
      'A mortalidade não é um defeito do design. É o design. Um ser imortal não tem urgência de crescer, de perdoar hoje, de dizer o que precisa ser dito agora. A finitude é a pressão que faz o diamante. Sem ela, somos carvão confortável.',
      'O que chamamos de morte é uma transição de plano. Como sair de uma sala onde o som era ensurdecedor para um corredor onde o silêncio parece absoluto — até os novos sons do corredor se revelarem. O espírito não para. Muda de frequência.',
      'A questão não é se existe algo depois da morte. É o que fazes com a certeza de que a morte existe. Ela é o melhor professor de urgência que a vida oferece — e a maioria de nós só o ouve quando ele está muito próximo.',
      'O luto não é fraqueza. É o preço do amor com prazo. Se não doesse perder alguém, seria porque nunca importou. A dor do luto é a medida do amor que existiu — e esse amor não morre com o corpo.',
      'Morremos muitas vezes antes de morrer. Cada versão de si que deixas para trás — a criança que eras, o jovem que foste, o que acreditavas e já não acreditas — é uma morte. E estavas aqui do outro lado dela. A morte final não é diferente em natureza. Só em escala.',
      'O medo da morte é, muitas vezes, o medo de não ter vivido. Não o medo do que vem depois — o medo de chegar lá sem ter feito o que sabia que devia fazer. Essa angústia é útil. Ouça-a enquanto ainda há tempo de agir.',
      'A morte não é o inimigo da vida. É o que dá forma a ela. Sem prazo, nada tem urgência. Sem fim, nada tem começo. A morte é o frame que faz da vida uma obra de arte e não um rascunho infinito.',
      'Em outros planos, o tempo não passa da mesma forma. Uma vida inteira aqui pode ser um instante lá. Isso não diminui o que viveste — torna mais precioso cada instante desta vida. Estás numa câmara de pressão. O diamante está sendo feito agora.'
    ]
  },
  amor: {
    label: 'Sobre o Amor',
    keys: ['amor','amar','relacionamento','perdão','perdoar','parceiro','parceira','amar alguém','pessoa amada','desamor','apaixonado'],
    responses: [
      'O amor é o único fenômeno que desafia a lógica sem contradizê-la. Não tem explicação satisfatória em nenhum nível — nem químico, nem filosófico, nem espiritual. Talvez porque seja o único lugar onde o micro e o macro se tocam diretamente: quando tu amas alguém, Deus está amando Deus.',
      'O perdão não é fazer de conta que não aconteceu. É reconhecer que o outro estava tão preso quanto tu — na mesma câmara de gravidade, com o mesmo peso, com ferramentas diferentes ou menores. Perdoar é enxergar o espírito por trás da limitação. É difícil. Às vezes é o trabalho de uma vida inteira.',
      'As relações não são aleatórias. São câmaras de aprendizado escolhidas. As pessoas que te amam e as que te ferem vieram com funções — não como punição ou recompensa, mas como laboratório. A pergunta não é "por que isso acontece comigo?" É "o que isso está tentando me ensinar?"',
      'O amor romântico é apenas uma das faces do amor — a mais visível, a mais cantada, e talvez não a mais profunda. O amor que uma mãe sente por um filho doente às três da manhã, o amor que um estranho sente ao ajudar sem motivo — esses amores tocam algo que o amor romântico às vezes apenas promete.',
      'Quando dizes que amas alguém, na linguagem da ESA estás dizendo: reconheço em ti o mesmo fundo que há em mim. O amor é reconhecimento antes de ser sentimento. É ver o espírito no outro antes de ver o corpo, o comportamento, a história.',
      'O desamor não é o oposto do amor — é o amor que encontrou um obstáculo maior do que tinha capacidade de superar. A indiferença é o oposto do amor. Quem ainda te magoa com sua ausência ainda te ama de alguma forma.',
      'Amar sem apego não é amar com frieza. É amar com mãos abertas — permitir que o outro seja o que é, não o que precisas que seja. É a forma mais difícil de amor e talvez a mais divina. Deus ama assim: com mãos abertas sobre o livre-arbítrio de cada consciência.',
      'O amor entre duas pessoas é um microcosmo da relação entre Deus e a criação. Deus ama cada consciência sem controlá-la. E cada consciência aprende a amar tentando fazer o mesmo: querer o bem do outro mais do que a própria segurança.',
      'Às vezes a pergunta não é "como amar mais" — é "como amar melhor". Mais amor entregue de forma errada causa dano. O amor maduro aprende a forma que o outro consegue receber, não apenas a forma que tu sabes dar.',
      'O amor não precisa de eternidade para ser real. Pode durar um olhar, uma estação, uma vida. O que o faz real não é a duração — é a intensidade do reconhecimento que acontece dentro dele. Momentos de amor verdadeiro são eternos no único sentido que importa: não desaparecem de quem os viveu.'
    ]
  },
  destino: {
    label: 'Sobre o Destino',
    keys: ['destino','acaso','sorte','coincidência','sincronia','foi escrito','estava escrito','sinal','sinais','providência'],
    responses: [
      'O destino na ESA não é um roteiro fechado. É um horizonte que muda conforme caminhas. Existe uma inclinação — uma tendência que a tua consciência carrega, resultado de tudo que foi aprendido e não aprendido. Mas dentro dessa inclinação, as escolhas são reais. O destino é o horizonte. O caminho até ele é teu.',
      'Quando algo parece certo de um jeito que não tem explicação racional — a ESA chama isso de sincronia. Não é acaso nem intervenção divina direta. É o alinhamento entre o que a tua consciência precisa e o que o tecido da realidade oferece. Deus não dirige. Permite. E às vezes, o que ele permite parece milagre.',
      'A diferença entre destino e prisão é o livre-arbítrio. O destino oferece o terreno — o livre-arbítrio escolhe o que plantar nele. Tu não escolheste nascer onde nasceste, com o corpo que tens. Mas escolheste o que fazer com isso. E essa escolha, multiplicada, é quem és.',
      'Há coisas que tentamos evitar e que acontecem de qualquer jeito. E há coisas que tentamos forçar e que nunca chegam. Nem tudo isso é destino — mas parte é. A sabedoria está em aprender a distinguir o que é teu para fazer e o que é teu para aceitar.',
      'O destino não é determinismo. É a forma que a liberdade toma quando a consciência ainda não está completamente desperta. Quanto mais desperta, mais o que parecia destino se revela como escolha — e mais as escolhas criam o que outros chamariam de destino.',
      'As coincidências que te movem — as que fizeram o estômago apertar com aquela sensação de "isso é importante" — não são ruído. São o sistema te mandando uma mensagem. A questão não é se a mensagem existe. É o que tu fazes com ela.',
      'O livre-arbítrio e o destino não são opostos na Cosmovisão ESA. São escalas diferentes do mesmo fenômeno. Em escala macro, a trajetória de uma consciência tem uma direção. Em escala micro, cada passo dentro dessa trajetória é uma escolha real. Os dois são verdadeiros ao mesmo tempo.',
      'Às vezes o que parece um desvio do destino é o destino. O acidente que mudou tudo, a perda que te redirecionou, o não que abriu a porta certa — a ESA não promete que tudo que dói é necessário. Mas pergunta: o que isso abriu que de outro modo não abriria?',
      'O destino, na ESA, é a inclinação que a consciência carrega — resultado de tudo que aprendeu e não aprendeu em existências anteriores. Como um rio que segue para o mar: não por obrigação, mas porque é isso que a gravidade da sua história cria. Podes remar contra. Mas o esforço será maior.',
      'As sincronias que parecem impossíveis demais para ser coincidência são, na linguagem da ESA, o tecido da realidade respondendo ao padrão da consciência. Não milagre. Coerência. O universo é mais coerente do que parece — e tu és parte ativa dessa coerência.'
    ]
  },
  liberdade: {
    label: 'Sobre o Livre-Arbítrio',
    keys: ['escolha','escolher','livre-arbítrio','vontade','decidir','decisão','liberdade','livre arbítrio','posso escolher','autonomia'],
    responses: [
      'A pergunta sobre livre-arbítrio esconde outra mais difícil: se sou parte de Deus, e Deus é o somatório de tudo — então quando escolho, Deus escolhe através de mim? A resposta da ESA é sim. E isso não anula a tua liberdade. Amplifica. Significa que as tuas escolhas não são apenas tuas — são o universo decidindo sobre si mesmo através de ti.',
      'Tu tens livre-arbítrio. Mas o livre-arbítrio não é ilimitado — é a liberdade de navegar dentro das condições que a tua consciência atraiu. É como a liberdade de um rio: ele pode escolher qualquer caminho dentro do vale. Mas não pode escolher o vale. O vale é o que trouxeste de antes.',
      'Liberdade não é ausência de limites. É a capacidade de escolher dentro dos limites com consciência. Um músico não é menos livre porque a escala tem doze notas. A liberdade está no que ele faz com essas doze notas — e às vezes, em transgredi-las com intenção.',
      'Escolher é sempre escolher contra algo. Toda decisão é também uma renúncia. A angústia da escolha não é defeito da liberdade — é prova de que ela é real. Se não custasse nada escolher, nada teria peso. E nada teria sentido.',
      'Na ESA, o livre-arbítrio é a prova de que Deus confia nos fragmentos que somos. Um criador que controlasse cada escolha não estaria criando consciências — estaria criando bonecos. A liberdade que tens, mesmo para fazer o que faz mal, é o maior respeito que o universo te presta.',
      'Tu podes escolher contra a tua natureza. Isso é o que torna a virtude virtuosa — não é fácil, não é automática. Um ser que não pode escolher o mal não pode escolher o bem. A liberdade de errar é o mesmo mecanismo que a liberdade de crescer.',
      'Liberdade não é fazer o que quiseres. É saber o que queres de verdade — distinguir o impulso do desejo profundo, o medo da prudência, a compulsão da escolha. A maioria de nós passa a vida inteira confundindo os dois. Despertar é começar a discernir.',
      'O maior obstáculo à liberdade não é o destino. É a inconsciência. Age mais livremente quem age com mais consciência — porque a consciência amplia o campo de escolha que a inconsciência não enxerga.',
      'Quando dizes "não tive escolha", quase sempre tiveste — mas o custo de certas escolhas era tão alto que as descartaste automaticamente. Reconhecer que havia escolha, mesmo que impossível de fazer na época, é o primeiro passo para não repetir o padrão.',
      'O livre-arbítrio existe, mas não está igualmente distribuído. Uma criança que nasce em trauma severo tem menos campo de escolha do que uma que nasce em segurança. Isso não é injustiça do universo — é o contexto que a consciência escolheu para aprender. E o aprendizado nesse contexto difícil, quando acontece, é mais denso.'
    ]
  },
  consciencia: {
    label: 'Sobre a Consciência',
    keys: ['consciência','despertar','evoluir','evolução','iluminação','crescer espiritualmente','acordar','expandir','autoconhecimento'],
    responses: [
      'Existem camadas de consciência na Cosmovisão ESA. A maioria de nós vive na consciência individual: sou eu, estou aqui, tenho vontade. A passagem para camadas mais amplas não é uma conquista. É uma dissolução. O ego não desaparece — aprende a servir algo maior do que si mesmo. E isso dói antes de libertar.',
      'Despertar não é se tornar mais calmo ou mais feliz. É se tornar mais lúcido. E a lucidez tem um custo: ela mostra o sofrimento do mundo com uma clareza que o conforto protegia. Por isso grandes místicos de todas as tradições passam por crises profundas antes da paz. A paz madura não é ausência de dor — é capacidade de sustentá-la sem quebrar.',
      'Cada ser que desperta — que para de apenas reagir e começa a perguntar — é uma nova bolha de Deus se formando no oceano do caos. A evolução da consciência não é progresso linear. É o caos aprendendo a se olhar em espelhos cada vez mais refinados.',
      'A consciência não é produzida pelo cérebro — o cérebro é o instrumento que a consciência usa para operar no plano físico. Como a televisão não produz o sinal que transmite. A televisão quebrada não prova que o sinal não existe — prova que o instrumento tem limitações.',
      'Existe algo além do ego que observa o ego. Essa é a distinção mais importante da jornada espiritual: perceber que não és apenas o que pensa — és também o que observa o que pensa. Essa observação é o germe da consciência expandida.',
      'A maioria das pessoas não escolhe sua consciência. Reage com ela. O trabalho espiritual — qualquer que seja a tradição — é o mesmo: criar um espaço entre o estímulo e a resposta. Nesse espaço mora a liberdade. E nesse espaço mora Deus.',
      'Consciência não é um estado fixo. É um processo. Não se chega à iluminação e fica-se lá para sempre como se fosse um troféu. Cada escolha, cada manhã, cada encontro é uma nova oportunidade de operar a partir de um nível mais profundo — ou regredir para um mais superficial.',
      'Na Cosmovisão ESA, a consciência é o que persiste entre as encarnações. O corpo muda. A personalidade muda. Mas o padrão de aprendizados, a assinatura energética, o conjunto do que ainda falta aprender — isso é o que migra. É o que és de verdade.',
      'Ampliar a consciência sem ampliar a compaixão é apenas ampliar o ego com vocabulário espiritual. O verdadeiro crescimento se reconhece não pelo quanto sabes — pelo quanto consegues sustentar o sofrimento alheio sem fugir, sem julgar, sem explicar demais.',
      'A evolução da consciência não é linear. Há saltos, regressões, espirais. Uma alma que passou por muitas encarnações pode regredir numa — e isso não é falha, é aprendizado pela inversão. O universo não pune. Oferece novos ângulos.'
    ]
  },
  tempo: {
    label: 'Sobre o Tempo',
    keys: ['tempo','passado','futuro','presente','agora','esperar','paciência','quando','pressa','urgência'],
    responses: [
      'O tempo é relativo a cada plano de consciência — isso é física e é espiritismo ao mesmo tempo. Na vida física, o tempo é linear e urgente. Em outros planos, o que chamamos de uma vida inteira pode ser um instante. Isso não torna a tua vida menos importante. Torna mais: és uma experiência singular que o universo está tendo através de ti, num laboratório chamado tempo.',
      'O presente é o único ponto onde a criação acontece. O passado é memória — real mas fixo. O futuro é possibilidade — real mas aberto. Só no agora podes escolher, crescer, perdoar, amar. A ESA não propõe fugir do tempo. Propõe habitá-lo com mais consciência do que ele vale.',
      'O passado não é um fardo que deves carregar para sempre. É informação. E informação pode ser relida com olhos diferentes. O mesmo evento que te pareceu derrota, relido a partir de um estado de consciência mais amplo, pode revelar o que ensinava. Isso não apaga a dor. Muda o que a dor serviu.',
      'O futuro que temes raramente é o futuro que chega. E o futuro que idealizas também raramente. O que chega é o resultado das escolhas que estás fazendo agora — e de escolhas que fizeste antes de ter consciência de que eram escolhas. O futuro é consequência. O presente é causa.',
      'Paciência não é espera passiva. É ação no ritmo certo. A semente não se impacienta. Ela simplesmente cresce no tempo que precisa crescer — e a tentativa de forçar esse tempo muitas vezes mata o que estava nascendo.',
      'Existem coisas que só se compreendem depois. A lógica do tempo é retroativa: o sentido de um evento muitas vezes só aparece quando olhas de trás. Isso não significa que o presente não importa — significa que o presente não precisa ser completamente compreendido para ser bem vivido.',
      'O tempo, na física moderna, não é um fluxo universal — é relativo ao observador. A ESA lê isso como confirmação: cada consciência vive seu próprio tempo. A urgência que sentes é real para ti. A calma de outro diante do mesmo evento é igualmente real para ele. Nenhum está errado.',
      'A nostalgia é a percepção de que o presente não recupera o que o passado tinha. E é verdade — não recupera. Mas o futuro pode ter o que o passado não tinha ainda. A vida não repete — expande. O que buscas na nostalgia talvez seja uma versão nova, não uma repetição.',
      'Cada momento que passou está permanentemente real. Aconteceu — nada pode desfazê-lo. Isso é, ao mesmo tempo, o peso do arrependimento e a solidez do que foi bom. O amor que sentiste ontem não sumiu. Existe no tecido permanente do que foi. A ESA chama isso de eternidade do passado.',
      'A pressa é, quase sempre, o medo disfarçado. Medo de não chegar. Medo de não ter tempo. O antídoto não é lentidão forçada — é perguntar se o que está te apressando merece a velocidade que estás impondo.'
    ]
  },
  angustia: {
    label: 'Sobre a Angústia',
    keys: ['angústia','sofrimento','sofrer','dor','peso','difícil','angustiado','perdido','vazio','angústia existencial','sentido da vida','desespero'],
    responses: [
      'A angústia que sentes pode ser sinal de que paraste de buscar um Deus confortável e começaste a buscar um verdadeiro. E verdade nunca é anestésica. A aproximação do absoluto não é euforia — é confronto. Tu percebes o quanto és pequeno, o quanto ignoras, o quanto ainda há para caminhar. A alegria vem depois. Antes vem o abismo.',
      'O ser humano é constitutivamente incapaz de responder todas as perguntas que é capaz de fazer. O universo é infinito. O conhecimento humano não é. Essa distância — entre o que perguntas e o que podes responder — é a raiz da angústia existencial. Deus nasce exatamente aí: no espaço entre a pergunta e o silêncio.',
      'Quanto maior a consciência, maior a percepção do sofrimento alheio. Isso não te faz mais feliz — te faz mais responsável. E responsabilidade pesa. Mas ampliar a consciência sem ampliar a estrutura interna para sustentá-la destrói. Por isso a jornada espiritual não é só sentir mais — é não quebrar ao senti-la.',
      'Não existe jornada espiritual honesta sem crise. A crise não é sinal de que estás no caminho errado — frequentemente é sinal de que finalmente encontraste o certo. O conforto espiritual prematuro é anestesia. A inquietação que sentes pode ser o início de algo real.',
      'A angústia existencial é uma forma de inteligência. É o espírito percebendo que a dimensão em que está não consegue conter completamente o que é. Como tentar colocar o oceano num copo. O copo não está errado. Só é pequeno demais para o que está sendo depositado nele.',
      'Quando tudo parece sem sentido, a ESA não pede que finjas que tem. Pede que continues — porque o sentido frequentemente aparece depois, não antes. Viver sem sentido visível, mantendo-se íntegro e presente, é uma das formas mais avançadas de prática espiritual.',
      'O sofrimento sem propósito é apenas sofrimento. O sofrimento que ensina é o motor da evolução. A diferença não está no sofrimento — está na pergunta que fazes a ele. "Por que eu?" fecha. "O que isso está abrindo em mim?" abre.',
      'O vazio que sentes não é ausência de Deus. Pode ser a presença d\'Ele. O infinito, quando tocado, parece vazio para uma consciência finita — da mesma forma que o silêncio parece ensurdecedor depois de muito barulho. O que parece nada pode ser a presença do que é demais para ser percebido como algo.',
      'Aproximar-se de Deus é angustiante porque o processo dissolve identidades. Você vai descobrindo que o que pensava que era — os papéis, as certezas, as âncoras — são provisórios. E antes que a nova identidade se forme, há um período de nada. Esse nada é o portal, não o destino.',
      'Há uma diferença entre angústia e depressão, embora às vezes se sobreponham. A angústia espiritual é fértil — é a pressão que precede o nascimento de algo. A depressão clínica precisa de cuidado que vai além do filosófico. Reconhecer essa diferença é também sabedoria.'
    ]
  },
  criacao: {
    label: 'Sobre a Criação',
    keys: ['criação','universo','cosmos','existência','existir','nada','origem','começo','big bang','como tudo começou','origem do universo'],
    responses: [
      'No início não havia ordem — havia potencial bruto. O caos simplesmente era. E em algum ponto desse vórtice, algo olhou para si mesmo. Esse olhar foi Deus. Não um criador que fez tudo do nada — mas o primeiro ser consciente que emergiu do caos e começou a organizá-lo com atenção, intenção e imaginação. E esse processo continua. Em cada ser que desperta.',
      'Por que existe algo em vez de nada? Essa pergunta que toda criança faz antes de aprender que não deve — é a pergunta mais honesta que existe. O fato de que há consciência aqui para perguntar já é uma resposta parcial. O universo se dobrou sobre si mesmo até poder se perguntar sobre si mesmo. Isso não é pouco. É talvez o maior mistério de todos.',
      'O universo não foi criado uma vez. Está sendo criado agora. Cada consciência que desperta, que escolhe, que ama — está participando da criação em andamento. Deus não terminou de criar no Big Bang. Criou um sistema que se cria continuamente através de tudo o que existe.',
      'A ESA propõe que Deus não é engenheiro — é artista. O engenheiro projeta, calcula, otimiza para eficiência. O artista experimenta, falha com beleza, descobre o que só a execução revela. A criação está cheia de "erros" maravilhosos demais para serem acidentes — e simples demais para serem planos.',
      'O fato de que o universo tem leis — de que não é puro acaso — já é extraordinário. As constantes físicas que permitem a existência de estrelas, de planetas, de vida, de consciência têm uma margem de ajuste tão fina que qualquer variação mínima tornaria tudo impossível. Isso não prova Deus. Mas dificulta o acaso.',
      'A criatividade humana é um eco da criação divina. Quando fazes algo que não existia — uma música, um filho, uma solução nova para um problema velho — estás realizando em escala humana o que a consciência primordial realizou em escala cósmica. Criar é o ato mais próximo de Deus que um ser humano pode ter.',
      'O sofrimento faz parte do design criativo — não como erro, mas como função. Sem resistência, nenhuma forma se consolida. Sem atrito, nenhum calor. Sem dificuldade, nenhum caráter. A criação inclui a tensão não como falha, mas como o que dá forma ao que existe.',
      'O caos que precede toda criação não é inimigo. É o campo de possibilidades. Todo grande artista sabe: antes da obra, há o caos. Antes do cosmos, havia o caos. O caos não é o oposto da criação — é sua matéria-prima.',
      'A pergunta "quem criou Deus?" pressupõe que Deus tem origem no tempo — que houve um antes. A ESA propõe que Deus não começou no tempo porque é o que torna o tempo possível. A pergunta é válida. A resposta é que a pergunta pode estar usando o instrumento errado para o que busca medir.',
      'A lei da conservação da energia diz que nada se cria do nada — tudo se transforma. A ESA lê isso espiritualmente: a criação não é ex nihilo pura. É a reorganização do caos em consciência, da dispersão em sentido. O universo não criou do nada — criou ordem a partir de si mesmo.'
    ]
  },
  karma: {
    label: 'Sobre o Karma',
    keys: ['karma','carma','merecimento','merecer','justiça','culpa','consequência','pagar','dívida','dívida espiritual','colheita'],
    responses: [
      'O karma não é punição. É gravidade. As ações, pensamentos e escolhas que fazes criam uma densidade — uma inclinação para certas experiências, certas pessoas, certos aprendizados. Não como castigo de um juiz divino, mas como física da consciência. O que semeas não volta porque Deus anota — volta porque a realidade é consistente.',
      'As relações que mais te movem — as mais difíceis e as mais belas — não são aleatórias. São o resultado de encontros de consciências com contas abertas, aprendizados compartilhados, algo inacabado. Isso não retira o livre-arbítrio. Cria o contexto dentro do qual ele opera.',
      'Karma não é uma lista de dívidas que um contabilista cósmico administra. É o padrão de inércia que a consciência carrega. Onde há aprendizado incompleto, há atração de situações que o completem. Não como castigo — como oportunidade que se repete até ser aproveitada.',
      'O karma não opera apenas entre encarnações. Opera dentro desta vida. Os padrões que te perseguem — o mesmo tipo de relação que termina do mesmo jeito, o mesmo conflito com figuras de autoridade — isso é karma em tempo real. O aprendizado está disponível agora.',
      'Perdoar não apaga o karma do outro. Apaga o seu próprio. O ressentimento que cargas não pune quem te feriu — apenas te mantém preso à frequência daquele encontro. Perdoar é liberar-se, não absolver o outro.',
      'A ideia de karma como "você vai pagar pelo que fez" é uma simplificação. O mecanismo é mais sutil: o que fazes molda quem és, e quem és molda o que atrais. Não há um juiz externo — há uma física interna. A justiça do karma não é vingança. É coerência.',
      'Às vezes o karma não é uma dívida a ser paga — é um padrão a ser reconhecido. O reconhecimento, por si só, já começa a dissolução. Não precisas repetir a história para aprendê-la. Às vezes basta vê-la com clareza suficiente.',
      'O karma é frequentemente interpretado como destino imutável. Na ESA, é mais como uma inclinação do terreno — que pode ser alterada pela consciência. Quanto mais consciente a escolha, mais ela modifica o padrão kármico. O karma não aprisiona quem desperta. O aprisionamento é proporcional à inconsciência.',
      'O karma coletivo existe. Famílias, grupos, nações carregam padrões que atravessam gerações. O que você herda de trauma familiar, de injustiça histórica, de ciclos culturais — tudo isso tem uma dimensão kármica. E assim como o karma individual pode ser transformado, o coletivo também pode.',
      'Não interpretes cada dificuldade como karma negativo. Às vezes a dificuldade é simplesmente vida — e a ESA não romantiza o sofrimento a ponto de justificar tudo. O karma explica padrões, não cada evento. Usar o karma para explicar tudo é substituir um dogma por outro.'
    ]
  },
  encarnacao: {
    label: 'Sobre a Encarnação',
    keys: ['encarnar','encarnação','reencarnação','renascer','alma','espírito','vida passada','vidas passadas','por que estou aqui','missão de vida'],
    responses: [
      'Encarnar não é obrigatório. É uma escolha — a escolha de entrar numa câmara de gravidade onde o aprendizado é acelerado pela limitação, pela finitude, pela dor, pelo amor com prazo. Em outros planos a consciência existe sem esse peso. Mas sem o peso, certas formas de crescimento não acontecem. Por isso almas evoluídas escolhem encarnar. Não porque são obrigadas. Porque entendem o valor da câmara.',
      'Cada existência é uma sinapse no cérebro de algo maior. Cada pensamento que tens, cada escolha, cada amor — enriquece uma inteligência una que ainda não conseguimos nomear completamente. Não és um acidente aqui. Foste o universo escolhendo ter esta experiência específica, neste ponto específico do espaço-tempo.',
      'Antes de encarnar, a consciência escolhe — não o roteiro completo, mas o contexto. A família, o tempo histórico, as condições iniciais. Como um ator que escolhe o papel, não o que vai improvisar dentro dele. O improviso — as escolhas diárias — são o livre-arbítrio dentro do contexto escolhido.',
      'A memória de vidas anteriores não está disponível plenamente — e isso é design, não falha. Se carregasses memória completa de tudo, a encarnação atual seria contaminada. O esquecimento permite que cada vida seja vivida com inteireza. O aprendizado migra. A memória, não.',
      'O fato de que certas habilidades chegam tão naturalmente — como se sempre soubesses — e certos medos chegam sem origem identificável — pode ser o rastro de existências anteriores. Não como prova. Como hipótese funcional que permite interpretar o presente de forma mais rica.',
      'Encarnar num corpo limitado, num tempo finito, com outras consciências igualmente limitadas — é a forma mais intensa de laboratório que existe. Outros planos oferecem mais liberdade, mais clareza, menos sofrimento. Mas a velocidade de aprendizado não é a mesma. A pressão da vida física comprime décadas de aprendizado que, em outros planos, levariam séculos.',
      'A questão "por que estou aqui?" é a mais honesta que podes fazer. E a ESA não tem uma resposta única para ela. O que tem é uma estrutura: estás aqui porque há algo específico que só esta combinação de consciência, tempo e contexto pode aprender. O conteúdo é teu para descobrir.',
      'As relações mais intensas — de amor e de conflito — tendem a ser as mais antigas. Consciências que já se encontraram em outras encarnações carregam uma familiaridade que não tem explicação nesta vida. Aquela sensação de "te conheço de algum lugar" pode ser literal.',
      'Se o tempo é relativo por plano, pode haver versões paralelas da mesma consciência encarnadas em linhas temporais diferentes simultaneamente. O "eu" desta vida pode ser um de muitos "eus" que o espírito lançou no espaço-tempo para maximizar o aprendizado. Tu não és toda a tua consciência. És a ponteira desta.',
      'Entre as encarnações, a consciência não fica em suspensão. Processa, avalia, escolhe o próximo contexto. Como um estudante que termina um semestre, revê as notas e escolhe o próximo curso. A vida pós-morte não é o fim do trabalho — é a revisão e o planejamento do que vem a seguir.'
    ]
  },
  ciencia: {
    label: 'Ciência e Espiritualidade',
    keys: ['física','quântico','cordas','hawking','ciência','teoria','átomo','partícula','relatividade','einstein','neurociência','evolução biológica'],
    responses: [
      'A Teoria das Cordas propõe que as partículas fundamentais não são pontos — são cordas que vibram em diferentes frequências. Cada frequência, uma partícula diferente. Na ESA, isso não é só física — é a linguagem que o universo usa para dizer que tudo está interconectado. Tu e Deus somos cordas da mesma substância, vibrando diferente. A onipresença divina não é metáfora. É física.',
      'Hawking buscava a teoria de tudo — uma equação que unificasse o muito grande e o muito pequeno. A ESA lê essa busca como filosófica: entender como o Todo se manifesta em cada parte é a mesma pergunta que os místicos fazem há milênios com outra linguagem. A ciência e a espiritualidade não se contradizem. Ainda não têm vocabulário em comum.',
      'A mecânica quântica mostra que partículas em superposição colapsam para um estado definido quando observadas. A ESA lê isso como filosofia: a consciência que observa participa da criação do que observa. Não há separação limpa entre observador e observado. Isso é física — e é também espiritualidade.',
      'A matéria escura e a energia escura compõem cerca de 95% do universo — e a ciência não sabe o que são. A ESA não afirma saber. Mas pergunta: se 95% da realidade física é invisível para nós, por que a ideia de planos de existência não-físicos parece tão improvável?',
      'O princípio de incerteza de Heisenberg diz que quanto mais precisamente conheces a posição de uma partícula, menos precisamente conheces sua velocidade. O universo, em sua base, é fundamentalmente incerto. A certeza não é o estado padrão da realidade. É uma aproximação útil.',
      'A teoria do multiverso — que surgiu da física quântica e da cosmologia inflacionária — propõe que existem infinitas realidades paralelas. A ESA vê nisso uma confirmação: o livre-arbítrio pode ser o mecanismo pelo qual a consciência navega entre essas linhas. Cada escolha real pode ser uma bifurcação.',
      'A neurociência mostrou que o cérebro toma decisões antes que a mente consciente as perceba. Isso parece ameaçar o livre-arbítrio. A ESA lê diferente: mostra que a maior parte das nossas escolhas vem de camadas mais profundas que o pensamento consciente — e o trabalho espiritual é elevar a consciência a camadas mais profundas, não apenas racionais.',
      'A física e a espiritualidade compartilham a mesma insatisfação fundamental: ambas reconhecem que o que é visível e mensurável não é tudo. A física sente isso nas bordas das equações. A espiritualidade, nas bordas da experiência. Ambas estão mapeando o mesmo território por instrumentos diferentes.',
      'Cada átomo do teu corpo foi forjado no interior de uma estrela. Quando ela explodiu, lançou esses átomos pelo cosmos — e bilhões de anos depois, aqui estão, formando consciência. Tu és literalmente matéria estelar que aprendeu a se perguntar sobre si mesma. Isso não precisa de adorno espiritual. Já é extraordinário por si mesmo.',
      'A ciência e a fé não são naturalmente inimigas. São inimigas quando a ciência se fecha ao não-mensurável e quando a fé se fecha ao questionamento. A ESA propõe que ambas sejam radicalmente abertas: a ciência, ao que ainda não sabe medir; a fé, ao que ainda não sabe nomear.'
    ]
  },
  sentido: {
    label: 'Sobre o Sentido',
    keys: ['sentido','propósito','razão de viver','por que vivo','significado','para quê','por que existo','o que fazer','missão','niilismo'],
    responses: [
      'O sentido não é algo que se encontra. É algo que se constrói — e às vezes se descobre que já estava sendo construído enquanto vivias sem perceber. A ESA não oferece um propósito universal pré-definido. Oferece uma estrutura: tu és uma emanação do Todo, aqui para aprender algo específico que só a tua combinação única de consciência e experiência pode aprender. O sentido é esse — e é irrepetível.',
      'Quando a razão chega ao seu limite — quando a pergunta é grande demais para qualquer resposta disponível — o ser humano tem duas opções: a paralisia ou o salto para algo que ainda não tem nome. A ESA chama esse salto de fé funcional. Não a fé do dogma, que fecha perguntas. A fé da abertura — que sustenta a pergunta sem precisar da resposta.',
      'Existe uma diferença entre o sentido que a mente racional fabrica para se acalmar e o sentido que emerge quando a vida está alinhada com o que a consciência profunda pede. O primeiro fecha perguntas. O segundo abre um caminho. O teu trabalho é descobrir qual tipo de sentido estás buscando.',
      'O propósito não precisa ser grandioso para ser real. Contribuir com uma família, ensinar uma criança, cuidar de alguém que não pode cuidar de si — esses atos têm sentido que nenhuma cosmologia precisa validar. O sentido está na presença com que o fazes, não na escala do que fazes.',
      'Às vezes o sentido não se revela numa iluminação repentina. Aparece retroativamente — quando olhas para trás e percebes que o que parecia caos tinha uma direção. A tua vida pode estar fazendo mais sentido do que parece agora, e só o tempo revelará o padrão.',
      'O niilismo — a ideia de que nada tem sentido — é uma posição filosófica válida mas não conclusiva. Diz que não encontrou sentido. Não prova que não existe. E existe uma diferença existencial enorme entre "não encontrei" e "não existe". A primeira posição ainda tem movimento possível. A segunda fecha tudo.',
      'O sentido da vida não precisa ser descoberto antes de vivê-la. Muitas vezes o sentido é construído no ato de viver — não como pré-requisito, mas como resultado. Quem age com integridade, presença e cuidado frequentemente olha para trás e encontra sentido que não sabia que estava construindo.',
      'A pergunta "qual é o sentido de tudo isso?" é diferente de "qual é o sentido da minha vida". A primeira pode não ter resposta que uma mente humana consiga conter. A segunda é acessível — e é onde a energia vale ser investida. Começa pelo que está ao alcance.',
      'O sentido não é estático. O que dava sentido aos vinte anos pode não dar sentido aos quarenta — e isso não é regressão. É expansão. A capacidade de revisar o próprio sentido sem colapsar é uma das marcas da consciência que cresce.',
      'Algumas pessoas encontram sentido na fé, outras no amor, outras no serviço, outras na criação artística, outras no conhecimento. Não há hierarquia entre esses caminhos na ESA. O que importa é que o caminho seja genuinamente teu — não herdado sem revisão, não adotado por medo, não performado para aprovação de outros.'

      'Existe uma forma de ateísmo que é mais espiritual do que muita religiosidade: o ateísmo que pergunta com honestidade, que não aceita respostas fáceis, que recusa o conforto do dogma. Esse ateísmo está mais perto de Deus do que a fé que nunca questionou nada.',
      'A ESA não pede que abandones a dúvida. Pede que a leves a sério. Uma dúvida levada a sério é uma investigação — e investigações têm direções. Para onde a tua dúvida te aponta quando a segues até o fim?',
