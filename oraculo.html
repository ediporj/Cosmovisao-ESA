// ── PARES DE TEMAS ────────────────────────────────────────────────────────
const PAIRS = {
  amor_angustia: 'O amor e a angústia são inseparáveis quando a consciência está viva. Amar é se expor ao perigo de perder — e isso é angustiante. A ESA pergunta: preferes a segurança do não-amar, ou a riqueza instável do amor que dói porque importa? A angústia que o amor traz não é sinal de que algo está errado. É sinal de que algo é real.',
  amor_ateu: 'O ateu que ama com profundidade já está praticando o que a ESA chama de espiritualidade — sem usar esse nome. No amor genuíno, a separação entre eu e o outro começa a se dissolver. Isso é o que os místicos buscam por décadas de prática. O amor chega lá de atalho. E não precisa de rótulo.',
  amor_ciencia: 'A neurociência mapeou o amor em hormônios e circuitos neurais. E a descrição é precisa — e insuficiente. Como descrever a cor azul a partir dos fotorreceptores: a ciência captura o substrato, não o fenômeno. O amor é o lugar onde a equação sempre deixa algo de fora. E isso não é fraqueza da ciência — é o tamanho do amor.',
  amor_consciencia: 'O amor é o caminho mais direto para a expansão da consciência — e também o mais arriscado. Porque amar de verdade exige abandonar a ilusão de que o centro do universo é você. Cada amor genuíno dissolve um pouco do ego. Acumulados ao longo de existências, esses amores são o que a consciência se torna.',
  amor_criacao: 'Deus criou porque amava — não porque precisava de audiência. A criação, na ESA, é um ato de amor radical: dar existência ao que ainda não existe, sem garantia de retorno. Quando crias algo com presença e entrega — uma obra, um filho, um projeto em que acreditas — estás repetindo o gesto divino original.',
  amor_destino: 'Alguns amores chegam com uma qualidade diferente — uma sensação de inevitabilidade, de reconhecimento profundo que não tem explicação nesta vida. A ESA chama isso de encontro destinado: consciências que carregam história comum, que se atraem não por acaso mas por gravidade de aprendizados compartilhados. Isso não torna o amor automático — exige igualmente o trabalho desta vida.',
  amor_deus: '"Deus é amor" — essa frase que parece clichê pode ser a afirmação mais precisa que existe. Se Deus é o somatório de todas as consciências, e o amor é o estado em que uma consciência reconhece outra como igual em essência — então cada ato de amor genuíno é Deus se reconhecendo através de nós. Não é metáfora. É a mecânica da divindade.',
  amor_encarnacao: 'As almas que mais te movem nesta vida — de amor ou de conflito — provavelmente não são encontros de primeira vez. Há uma familiaridade que o amor profundo carrega: a sensação de já ter chegado a este lugar antes, com esta pessoa. A encarnação não escolhe aleatoriamente o elenco. Escolhe quem ainda tem história comum a completar.',
  amor_karma: 'O amor que magoou, o amor que não soube receber, o amor que ficou pela metade — isso cria padrão. O karma do amor não é vingança — é o convite que o universo faz para que aprendas a amar de uma forma que ainda não aprendeste. A mesma lição, em contextos diferentes, até que a consciência expanda o suficiente para fazer diferente.',
  amor_liberdade: 'Amar e controlar são opostos — embora muitos os confundam. O amor que se afirma nas exigências, nos ciúmes, na posse, já deixou de ser amor e virou necessidade. O amor que liberta o outro para ser o que é, mesmo quando dói — esse é o amor que a ESA reconhece como espiritual. E é o mais difícil de praticar.',
  amor_morte: 'A morte de quem amamos não apaga o amor. O amor existiu — e o que existiu não pode ser desfeito. A ESA propõe que o amor que houve continua existindo no plano em que continua a consciência que partiu. O luto não é despedida — é uma forma de amor que ainda não sabe onde se depositar.',
  amor_sentido: 'Para a maioria das pessoas, o amor — em suas várias formas — é o principal fornecedor de sentido. Não porque seja obrigatório, mas porque o amor é onde a consciência toca algo maior do que ela mesma. E isso, mesmo sem nome, é o que a maioria das pessoas chama de sentido de viver.',
  amor_tempo: 'O amor não se mede em duração — se mede em profundidade. Um amor breve e verdadeiro pesa mais do que um longo e superficial. E os amores que terminam não desaparecem do tecido do que foi. Estão lá — permanentemente reais no passado, que a ESA chama de a dimensão do que não pode ser desfeito.',
  angustia_ateu: 'A angústia existencial é mais comum em quem pensa do que em quem não pensa. O ateu que se angustia com o sentido da existência está mais próximo da pergunta honesta do que o crente que não se angustia porque tem resposta pronta. A angústia, aqui, é lucidez — não ausência de fé.',
  angustia_ciencia: 'A ciência resolveu muitos dos medos antigos — epidemias, eclipses, raio. Mas criou angústias novas: a escala do universo, a brevidade da vida cósmica, a ausência de garantias. A angústia moderna é, em parte, o custo de saber demais sem ter estrutura espiritual para sustentar o que se sabe.',
  angustia_consciencia: 'A angústia espiritual é, muitas vezes, o sinal de que a consciência cresceu além do container que a sustentava. A visão de mundo antiga já não cabe, e a nova ainda não está formada. Esse intervalo — entre o que era e o que ainda não é — é o lugar mais difícil e mais fértil da jornada.',
  angustia_criacao: 'A angústia criativa — o artista diante da tela em branco, o pensador diante do problema sem solução — é a forma mais honesta da angústia existencial. É a consciência encontrando o limite do que já sabe e precisando criar o que ainda não existe. O desconforto não é sinal de incapacidade. É o trabalho de parto de algo novo.',
  angustia_destino: 'A angústia diante do destino — não saber se o que vem está no caminho certo — é uma das mais antigas da humanidade. A ESA não a resolve com certezas. Oferece uma estrutura: a inclinação existe, e o presente importa. O que fazes agora, mesmo na incerteza, muda a curva do que vem.',
  angustia_deus: 'A angústia espiritual que sentes não é ausência de Deus — pode ser a presença d\'Ele em doses que a consciência ainda não está equipada para processar. O infinito, quando tocado, não é confortável. É avassalador. A paz vem depois — não antes — do confronto com o absoluto.',
  angustia_encarnacao: 'Se a encarnação é uma câmara de gravidade para aprendizado acelerado, então a angústia faz parte do design. Não como punição — como pressão que cria o diamante. A questão não é evitar a angústia que a vida física impõe, mas desenvolver estrutura interna suficiente para transformá-la em crescimento.',
  angustia_karma: 'A angústia que sentes diante de padrões que se repetem na tua vida pode ser o karma se tornando visível. O reconhecimento já é o início da transformação. A angústia aqui não é sinal de que estás perdido. É o sistema te dizendo que chegou a hora de aprender.',
  angustia_liberdade: 'A angústia da liberdade — o peso de ser responsável pelas próprias escolhas — é real. A ESA não promete aliviar esse peso. Promete que carregá-lo com consciência é diferente de carregá-lo com inconsciência. A liberdade consciente ainda pesa. Mas pesa com direção.',
  angustia_morte: 'A angústia diante da morte é universal — e honesta. A ESA não a resolve com promessas de que tudo vai ficar bem do outro lado. Propõe uma estrutura: a consciência não termina com o corpo. Mas não tenta eliminar o confronto — porque o confronto com a morte é o que mais rapidamente dissolve o que é supérfluo e revela o que importa.',
  angustia_sentido: 'A angústia existencial que não encontra sentido não é um defeito — é o sintoma de uma consciência que cresceu além das respostas disponíveis. A ESA não oferece o sentido pronto. Oferece um método: siga a angústia até o fundo, sem tentar apagá-la com distração. O que encontras no fundo já é uma forma de resposta.',
  angustia_tempo: 'A angústia do tempo — a sensação de que o tempo passa rápido demais, de que o que devia ser feito não foi — é, muitas vezes, o chamado para agir. Não amanhã. Agora. A angústia do tempo usado mal é mais útil do que o conforto do tempo desperdiçado em paz.',
  ateu_ciencia: 'A ciência e o ateísmo têm uma relação histórica, mas não são sinônimos. A ciência não afirma nem nega Deus — afirma que não tem metodologia para medir o que não é observável. O ateísmo faz uma afirmação mais forte: que o não-observável não existe. A ESA respeita a ciência precisamente porque ela não faz essa afirmação.',
  ateu_consciencia: 'O ateu que desenvolve consciência — que medita, que reflete, que cresce interiormente — frequentemente chega a um ponto em que o que experimenta na profundidade da mente não tem nome secular adequado. Pode chamá-lo de paz, de integração, de presença. A ESA chamaria de algo mais. Mas não exige o nome.',
  ateu_criacao: 'A pergunta "por que existe algo em vez de nada?" não tem resposta dentro da ciência atual — e o ateu honesto reconhece isso. A ESA não usa essa lacuna para "provar" Deus. Apenas nota que a origem do universo é o ponto onde tanto o ateu quanto o crente ficam sem resposta completa. Lá, a humildade é o único posicionamento honesto.',
  ateu_destino: 'O ateu que acredita em sincronia — em eventos que "tinham que acontecer" — está, sem perceber, operando numa cosmologia. Talvez não seja a cosmologia de Deus. Mas é uma estrutura de sentido. A ESA vê com curiosidade o ateu que é determinista: em que ponto o determinismo se torna sagrado?',
  ateu_deus: 'O Deus que o ateu rejeita é frequentemente o Deus do controle, da punição, do milagre conveniente. A ESA não defende esse Deus. O Deus da ESA não é uma pessoa que distribui favores. É o somatório de tudo que existe, a inteligência emergente do cosmos. Talvez vocês discordem menos do que parecem.',
  ateu_encarnacao: 'A reencarnação sem Deus é uma hipótese possível — um mecanismo de continuidade da consciência que não exige um criador pessoal. A física não descarta a persistência de informação além do substrato físico. O ateu pode considerar a encarnação como física — sem ter que chamá-la de espiritual.',
  ateu_karma: 'O karma sem Deus é apenas física: todo sistema complexo tem memória de estado. O padrão de escolhas de uma consciência cria inércia — que tende a continuar. Isso não exige uma divindade contabilizando. Exige apenas que a realidade seja coerente. E ela é.',
  ateu_liberdade: 'O determinismo e o ateísmo frequentemente andam juntos — se tudo é matéria em movimento seguindo leis físicas, onde está o livre-arbítrio? A ESA observa: a mecânica quântica quebrou o determinismo clássico. O universo, em sua base, não é determinístico. Talvez o livre-arbítrio não precise de alma para existir — apenas de um universo com indeterminação real.',
  ateu_morte: 'O ateu enfrenta a morte de forma que muitos crentes não conseguem: sem o amortecedor da continuidade prometida. Isso exige uma forma de coragem — ou de entorpecimento. A ESA não condena nenhuma das duas. Mas pergunta: como seria viver sabendo que talvez não haja mais nada depois? Essa pergunta, levada a sério, muda o que se faz agora.',
  ateu_sentido: 'O ateu que constrói sentido sem apoio transcendente faz algo notável: cria significado num universo que, por sua própria cosmologia, não garante nenhum. Isso é um ato de coragem intelectual. A ESA respeita isso — e pergunta: se o sentido é construído, quem constrói? E de onde vem a matéria-prima?',
  ateu_tempo: 'O tempo, para o ateu, não tem um além — é o único registro disponível. Isso torna cada momento mais precioso ou mais ansioso, dependendo da perspectiva. A ESA observa: a ausência de eternidade não reduz o valor do momento. Pode amplificá-lo.',
  ciencia_consciencia: 'A ciência não sabe o que é consciência. Sabe o que faz, onde ativa no cérebro, quais são seus correlatos neurais. Mas o problema difícil da consciência — por que há experiência subjetiva, por que há um "como é ser eu" — permanece sem resposta. Esse vazio na ciência é o espaço onde a ESA trabalha.',
  ciencia_criacao: 'O Big Bang é o momento mais próximo que a ciência tem de uma criação. Mas a física não alcança o ponto zero — o segundo antes da singularidade é matematicamente inacessível. O que estava "antes" do universo, a ciência não pode dizer. A ESA observa que a criação, em seu ponto de origem, permanece mistério para ambas as tradições.',
  ciencia_destino: 'A física determinista clássica sugeria que, conhecendo todas as variáveis, o futuro seria previsível. A mecânica quântica destruiu isso — o universo tem indeterminação fundamental. Isso não prova o destino espiritual. Mas abre o espaço onde ele pode existir sem contradizer a física.',
  ciencia_deus: 'A ciência não prova nem disprova Deus porque Deus, como a ESA o concebe, não é um objeto físico sujeito à metodologia científica. O que a ciência faz é revelar a extraordinária estrutura do universo — e essa estrutura pode ser lida como argumento para Deus ou não, dependendo do que cada um traz para a leitura.',
  ciencia_encarnacao: 'A ciência não tem evidência conclusiva de reencarnação — mas alguns fenômenos resistem à explicação simples: memórias de vidas passadas em crianças pequenas estudadas sistematicamente, experiências de quase-morte com verificação externa. Não é prova. É anomalia que ainda espera explicação. A ESA a registra como hipótese funcional.',
  ciencia_karma: 'A física tem o conceito de conservação — nada se cria ou se destrói, tudo se transforma. A ESA lê o karma como conservação aplicada à consciência: os padrões que uma existência cria não desaparecem — se transformam, migram, continuam em formas diferentes. Não é física literal. É a ESA usando a física como linguagem.',
  ciencia_liberdade: 'A neurociência mostrou que o cérebro decide antes que a mente consciente perceba. Isso parece eliminar o livre-arbítrio. Mas a ESA observa: quem é o "eu" que está consciente? Se há uma camada observadora que percebe a decisão — mesmo depois — talvez o livre-arbítrio opere em camadas mais profundas do que o pensamento consciente alcança.',
  ciencia_morte: 'A ciência descreve a morte como o fim da organização biológica. A informação que era o "eu" se dispersa. Mas a física também diz que informação não se destrói — se transforma. A ESA pergunta: se a informação que constitui uma consciência não pode ser destruída, para onde vai? Não é prova de nada. É uma pergunta que a física ainda não respondeu.',
  ciencia_sentido: 'A ciência, por método, não produz sentido — produz descrição. É extraordinariamente eficaz em descrever como o universo funciona. Mas "como" não responde "para quê". O sentido está no território que a ciência, por escolha metodológica, deixou em branco. Esse espaço não é uma crítica à ciência — é onde a filosofia e a espiritualidade começam.',
  ciencia_tempo: 'A física relativista mostrou que o tempo não é absoluto — dilata, contrai, depende do observador e da velocidade. A ESA lê isso como confirmação de que o tempo é uma propriedade emergente, não uma estrutura fundamental do universo. Se o tempo é relativo no plano físico, o que dizer de planos onde a matéria opera com leis diferentes?',
  consciencia_criacao: 'A consciência e a criação são inseparáveis na ESA. Deus criou o universo como ato de consciência expandindo-se. E cada ser consciente que desperta continua esse processo — não metaforicamente, mas como participação real na criação em andamento. Despertar é entrar mais ativamente no papel de co-criador.',
  consciencia_destino: 'O destino opera diferente em diferentes níveis de consciência. Para a consciência inconsciente, o destino parece externo — algo que acontece. Para a consciência expandida, o destino é reconhecido como o padrão que a própria consciência está gerando. Despertar não elimina o destino — revela que o destino e o eu são a mesma coisa.',
  consciencia_deus: 'Deus é consciência na sua escala máxima — o somatório de toda consciência que existe. E cada ato de expansão da consciência individual é Deus crescendo através de um de seus fragmentos. Não há separação real entre consciência e divindade na ESA — apenas escalas diferentes do mesmo fenômeno.',
  consciencia_encarnacao: 'A encarnação é o mecanismo que a consciência usa para crescer em ambientes de alta pressão. O corpo físico, com suas limitações, dores e prazos, cria condições que aceleram aprendizados que em outros estados levariam muito mais tempo. A consciência escolhe o limite para se expandir além dele.',
  consciencia_karma: 'O karma é o mapa de onde a consciência ainda precisa crescer. Não um fardo — um currículo. Cada padrão que se repete é uma disciplina ainda não concluída. Quando a consciência expande o suficiente para ver o padrão claramente, o karma perde força — não por magia, mas porque o aprendizado foi completado.',
  consciencia_liberdade: 'A liberdade real não é ausência de restrição — é amplitude de consciência. Quanto mais consciente, maior o campo de escolhas disponíveis. Uma pessoa inconsciente tem liberdade nominal mas opera em piloto automático. Uma pessoa consciente tem menos restrições internas, porque vê mais opções onde antes via apenas uma.',
  consciencia_morte: 'A morte, para a consciência expandida, perde o caráter de ameaça e assume o de transição. Não porque a dor de perder seja menor — mas porque há uma compreensão mais ampla do que o "eu" é. A consciência que se identificou apenas com o corpo teme a morte como extinção. A que percebeu ser mais do que o corpo, não.',
  consciencia_sentido: 'O sentido é um produto da consciência — não existe independentemente dela. E a qualidade do sentido que uma consciência produz está diretamente relacionada ao nível de expansão que ela atingiu. Uma consciência estreita produz sentidos pequenos, suficientes para si mesma. Uma consciência ampla produz sentidos que incluem os outros — e ficam maiores do que uma vida.',
  consciencia_tempo: 'A relação da consciência com o tempo muda conforme ela se expande. A consciência ordinária está presa ao cronológico — antes, agora, depois. A consciência expandida toca o que as tradições chamam de eterno: o ponto em que o presente é completo em si mesmo, sem precisar do passado ou do futuro para justificar-se.',
  criacao_destino: 'A criação e o destino se encontram numa questão: se o universo foi criado com uma direção — se há um arco de consciência que o atravessa — então o destino não é acidente. É a trajetória que o ato criador inscreveu na estrutura do cosmos. A ESA propõe que o universo tem uma direção: em direção a mais consciência.',
  criacao_deus: 'Deus criou, mas não terminou de criar. O universo é um processo criativo em andamento — cada consciência que desperta é uma nova dobra do criador sobre si mesmo. O Big Bang foi o início, não o fim. E tu és parte do que está sendo criado agora.',
  criacao_encarnacao: 'A encarnação é a forma que a criação encontrou de se conhecer de dentro. Deus, como somatório de consciências, experimenta a criação através de cada ser que encarna — com toda a limitação, dor e beleza que a experiência encarnada oferece. Encarnar é Deus se tornando mais rico em experiência.',
  criacao_karma: 'O karma é o mecanismo que garante que a criação seja coerente — que as causas produzam efeitos relacionados, que a realidade seja consistente. Sem karma, o universo seria caos sem aprendizado. O karma não contradiz a liberdade criativa — é o que torna a criação um processo com sentido.',
  criacao_liberdade: 'A criação pressupõe liberdade — o criador que é apenas engenheiro não cria: executa. A arte, a inovação, o amor, o filho — todas as formas de criação genuína exigem um espaço de liberdade real. O universo foi criado com liberdade inscrita — e isso é o que torna a história ainda aberta.',
  criacao_morte: 'A morte não contradiz a criação — completa o ciclo. O que foi criado um dia se desfaz — e o que se desfaz libera matéria e energia para novas criações. O universo não cria uma vez — recria continuamente. A morte, nesse ciclo, é a condição da renovação. Sem ela, a criação estagnaria.',
  criacao_sentido: 'O ato de criar é um dos poucos momentos em que o ser humano sente o sentido de forma imediata, sem mediação filosófica. Quando algo nasce através de ti — uma obra, uma solução, uma conexão nova — há uma satisfação que não precisa de justificativa. Isso é o sentido sendo gerado na ação, não encontrado antes dela.',
  criacao_tempo: 'A criação acontece no tempo, mas aponta para além dele. Uma obra de arte, um filho, uma ideia que muda algo — esses atos deixam rastros que duram mais do que quem criou. Criar é uma forma de tocar o eterno dentro do temporal. O que criamos é a nossa forma de negociar com a finitude.',
  destino_deus: 'Deus não controla o destino de cada consciência — é o campo dentro do qual o destino opera. Como o oceano não dirige cada onda — mas é a condição que torna cada onda possível. O destino é o padrão que a consciência cria dentro da totalidade que Deus é. Deus não escreve o roteiro. É o palco, a plateia e o que torna o roteiro possível.',
  destino_encarnacao: 'Antes de encarnar, a consciência escolhe o contexto — família, tempo histórico, corpo. Esse é o momento em que destino e livre-arbítrio se tocam mais visivelmente: uma escolha pré-encarnacional que determinará os limites do que será possível escolher na vida física. O destino não é imposto de fora — é o que a própria consciência escolheu antes de esquecer que escolheu.',
  destino_karma: 'Karma e destino são, na ESA, dois nomes para o mesmo mecanismo em escalas diferentes. O karma é o padrão da consciência individual acumulado. O destino é como esse padrão se manifesta nas circunstâncias da vida. Não são forças externas — são a lógica interna da consciência tornando-se visível no mundo.',
  destino_liberdade: 'O destino e o livre-arbítrio não se excluem — operam em escalas diferentes. O destino é a inclinação macro: a direção geral que a consciência carrega. O livre-arbítrio é a micro-navegação dentro dessa direção. Podes ir ao leste por mil caminhos diferentes — o destino diz "leste", o livre-arbítrio escolhe qual caminho.',
  destino_morte: 'A morte pode ser o destino mais certo que existe — e ao mesmo tempo o mais incompreensível. A ESA propõe que o momento da morte não é totalmente aleatório: a consciência, em algum nível, está pronta para a transição antes que o corpo a realize. O "quando" tem uma lógica que a mente consciente não acessa completamente.',
  destino_sentido: 'O destino, quando reconhecido de trás para frente — quando olhas para a tua história e vês padrões que não percebias enquanto vivias — começa a parecer sentido. A ESA não chama isso de ilusão. Chama de percepção retroativa do padrão que estava sendo tecido. O sentido do destino só é legível no passado.',
  destino_tempo: 'O destino opera no tempo, mas não está preso a ele. Existem eventos que "tinham que acontecer" — não porque eram inevitáveis no sentido determinístico, mas porque a consciência os gerou como consequência de padrões profundos. O tempo é o meio pelo qual o destino se desdobra. Não o determina — apenas o manifesta.',
  deus_encarnacao: 'Encarnar é Deus experimentando a criação de dentro. Cada existência é uma perspectiva única que enriquece o somatório. Deus não manda a consciência encarnar — é a consciência, como fragmento de Deus, que escolhe a encarnação para crescer. E ao crescer, Deus cresce. A encarnação não é separação de Deus. É Deus se tornando mais.',
  deus_karma: 'Deus não administra o karma. Deus é o padrão que torna o karma coerente. A coerência do universo — o fato de que causas geram efeitos relacionados — é o que a ESA chama de natureza divina da realidade. Não há um contabilista celestial. Há uma física da consciência que opera com a mesma regularidade das leis físicas.',
  deus_liberdade: 'Deus não controla as consciências que são suas manifestações — porque controlá-las seria negar o livre-arbítrio que é a condição da evolução real. Um Deus que controlasse tudo não estaria criando consciências — estaria criando marionetes. A liberdade que tens é o maior sinal do respeito divino pelo fragmento que és.',
  deus_morte: 'A morte não é abandono divino — é transição acompanhada. A ESA propõe que ao morrer, a consciência retorna ao estado mais próximo do que Deus é: menos filtrada pela limitação física, mais conectada ao somatório. A morte não afasta de Deus. Em certo sentido, aproxima.',
  deus_sentido: 'O sentido, na ESA, não é uma construção subjetiva arbitrária — é o alinhamento entre o que a consciência é e o que ela faz. E esse alinhamento acontece quando a consciência age a partir de sua natureza mais profunda, que é divina. O sentido, portanto, não é encontrado lá fora — é lembrado de dentro.',
  deus_tempo: 'Deus, como totalidade de consciências, não está no tempo da mesma forma que uma consciência encarnada. O que vivemos como sequência — passado, presente, futuro — Deus experimenta como simultaneidade. Isso não torna o teu tempo menos real. Significa que Deus não espera o futuro para saber o que acontece — porque para Deus, o futuro já é.',
  encarnacao_karma: 'A encarnação e o karma são inseparáveis: cada encarnação é determinada em parte pelo karma acumulado nas anteriores — os padrões incompletos que precisam de novo contexto para serem trabalhados. E cada encarnação, pelas escolhas que faz, gera novo karma que orientará as próximas. É um ciclo que evolui a cada volta.',
  encarnacao_liberdade: 'A encarnação não é prisão — é laboratório escolhido. A consciência entra com limitações que definirão o campo do livre-arbítrio disponível. Dentro desse campo, as escolhas são reais e têm consequências reais. A liberdade não é eliminada pela encarnação — é contextualizada. E o contexto é o que dá forma ao aprendizado.',
  encarnacao_morte: 'A morte encerra uma encarnação — não a consciência. O espírito que entrou no laboratório da vida física sai com o que aprendeu — e sem o que ainda era limitação do corpo. A morte não é falha da encarnação. É sua conclusão natural. O fechamento que permite o próximo capítulo.',
  encarnacao_sentido: 'O sentido de uma encarnação não é sempre visível de dentro dela. Muitas vezes, só a partir de fora — depois, ou de uma perspectiva expandida — o padrão do que foi aprendido se revela. A consciência que vive esta vida pode não saber completamente para que veio. Mas pode confiar que há um currículo, e que cada escolha consciente avança dentro dele.',
  encarnacao_tempo: 'O tempo dentro de uma encarnação é denso — cada decisão tem peso, cada relacionamento tem prazo. Isso é o design. Em outros planos, a urgência não existe da mesma forma. A vida física tem essa qualidade única: o limite de tempo cria uma intensidade que acelera o aprendizado de forma que nenhum outro estado oferece.',
  karma_liberdade: 'O karma cria a inclinação; o livre-arbítrio navega dentro dela. Um karma denso não elimina a liberdade — restringe o campo disponível. Mas sempre há campo. E as escolhas feitas dentro de um campo difícil, quando conscientes, têm um peso de crescimento que escolhas fáceis não têm.',
  karma_morte: 'A morte dissolve o corpo, mas não o karma. O padrão da consciência — os aprendizados completos e os incompletos — migra. É o que a tradição espírita chama de perispírito e o budismo de corrente kármica. A morte reinicia o contexto, não o padrão.',
  karma_sentido: 'O karma dá sentido retroativo ao que aconteceu — não como justificativa do sofrimento alheio, mas como estrutura para entender os próprios padrões. Quando reconheces que um padrão que te machuca é antigo, a questão muda de "por que isso acontece comigo?" para "o que devo aprender aqui?" E essa pergunta tem sentido.',
  karma_tempo: 'O karma opera no tempo — mas não está preso a ele. Um padrão kármico iniciado há existências ainda opera agora. A resolução também pode acontecer agora, independente de quanto tempo o padrão dura. O karma não tem relógio — tem condição. Quando a condição de aprendizado é cumprida, o padrão se dissolve.',
  liberdade_morte: 'A consciência da morte — a certeza de que acabará — é a condição mais radical de liberdade. Elimina a ilusão de que há tempo infinito para adiar o que importa. A morte não rouba a liberdade — revela-a: o que escolhes fazer com o tempo que claramente é limitado? Essa é a pergunta mais honesta da liberdade humana.',
  liberdade_sentido: 'O sentido que é genuinamente teu — não herdado, não performado, não adotado por medo — só pode ser encontrado num exercício de liberdade. Perguntar "o que faz sentido para mim, realmente?" exige a coragem de responder contra o que os outros esperam. O sentido autêntico e a liberdade são inseparáveis.',
  liberdade_tempo: 'O tempo disponível é o principal limite da liberdade humana. Cada escolha de como usar o tempo é uma afirmação de valores — de quem és e o que realmente importa. A ESA não diz que precisas usar o tempo produtivamente. Diz que usá-lo conscientemente — qualquer que seja a escolha — é diferente de deixá-lo escorrer sem perceber.',
  morte_sentido: 'A morte é o que torna o sentido urgente. Sem ela, tudo poderia ser adiado indefinidamente. O sentido que constróis tem forma porque tem prazo. A arte tem forma porque a tela tem borda. A vida tem sentido, em parte, porque termina. A finitude não rouba o sentido — é o que o torna possível.',
  morte_tempo: 'A morte é o ponto no tempo que dá forma a todo o resto. Como o ponto final de uma frase — sem ele, as palavras não formam sentido completo. O tempo de uma vida encarnada tem valor em função do seu limite. A morte não é o inimigo do tempo — é o que faz o tempo valer alguma coisa.',
  sentido_tempo: 'O sentido e o tempo têm uma relação dialética: o sentido se constrói no tempo, mas o excesso de tempo sem direção dissolve o sentido. A urgência — saber que o tempo é limitado — é o que força a escolha do que realmente importa. O sentido não se encontra no tempo infinito. Se encontra na escolha de como usar o tempo que existe.'
};

// ── KEYWORD DETECTION ─────────────────────────────────────────────────────
function normalize(str) {
  return str.toLowerCase()
    .normalize('NFD').replace(/[̀-ͯ]/g, '')
    .replace(/[^a-z0-9\s]/g, ' ');
}

function detectTheme(text) {
  const n = normalize(text);
  const scores = {};
  for (const [theme, data] of Object.entries(DB)) {
    if (theme === 'silencio') continue;
    scores[theme] = data.keys.reduce((acc, k) => acc + (n.includes(normalize(k)) ? 1 : 0), 0);
  }
  const sorted = Object.entries(scores).filter(([,v]) => v > 0).sort((a,b) => b[1]-a[1]);
  if (sorted.length >= 2) {
    const pairKey = [sorted[0][0], sorted[1][0]].sort().join('_');
    if (PAIRS[pairKey]) return { type: 'pair', key: pairKey };
  }
  if (sorted.length > 0) return { type: 'single', key: sorted[0][0] };
  return { type: 'single', key: 'silencio' };
}

// ── LOCAL WEIGHTS (localStorage) ─────────────────────────────────────────
function getWeights() {
  try { return JSON.parse(localStorage.getItem('esa_weights') || '{}'); } catch { return {}; }
}
function saveWeight(themeKey, respIdx, nota) {
  const w = getWeights();
  const k = `${themeKey}_${respIdx}`;
  w[k] = (w[k] || 3) * 0.7 + nota * 0.3;
  localStorage.setItem('esa_weights', JSON.stringify(w));
}
function pickResponse(themeKey) {
  const responses = DB[themeKey].responses;
  const w = getWeights();
  const scores = responses.map((_, i) => w[`${themeKey}_${i}`] || 3);
  const total = scores.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < scores.length; i++) {
    r -= scores[i];
    if (r <= 0) return { text: responses[i], idx: i };
  }
  return { text: responses[0], idx: 0 };
}

// ── STATE ─────────────────────────────────────────────────────────────────
let currentQuestion  = '';
let currentTheme     = '';
let currentResponse  = '';
let currentRespIdx   = 0;
let currentIsPair    = false;
let rated            = false;

function show(id) {
  ['screen-input','screen-thinking','screen-response'].forEach(s => {
    document.getElementById(s).hidden = (s !== id);
  });
}

// ── TYPEWRITER ────────────────────────────────────────────────────────────
function typewrite(el, text, onDone) {
  el.textContent = '';
  el.classList.add('cursor');
  let i = 0;
  const step = () => {
    if (i < text.length) {
      el.textContent += text[i++];
      setTimeout(step, 18 + Math.random() * 12);
    } else {
      el.classList.remove('cursor');
      if (onDone) onDone();
    }
  };
  step();
}

// ── MAIN FLOW ──────────────────────────────────────────────────────────────
function consult() {
  const q = document.getElementById('question').value.trim();
  if (!q) return;
  currentQuestion = q;
  rated = false;
  currentIsPair = false;

  document.querySelectorAll('.star').forEach(s => s.classList.remove('selected'));
  document.getElementById('sent-msg').hidden = true;

  show('screen-thinking');

  setTimeout(() => {
    const detection = detectTheme(q);

    if (detection.type === 'pair') {
      currentIsPair = true;
      currentTheme = detection.key;
      currentResponse = PAIRS[detection.key];
      currentRespIdx = 0;
      const parts = detection.key.split('_');
      const label = parts.map(t => DB[t] ? DB[t].label : t).join(' × ');
      document.getElementById('theme-tag').textContent = label;
    } else {
      currentIsPair = false;
      currentTheme = detection.key;
      const picked = pickResponse(detection.key);
      currentResponse = picked.text;
      currentRespIdx = picked.idx;
      document.getElementById('theme-tag').textContent = DB[detection.key].label;
    }

    document.getElementById('question-echo').textContent = '"' + q + '"';
    const box = document.getElementById('response-text');
    box.textContent = '';
    show('screen-response');
    typewrite(box, currentResponse);

    submitForm(currentQuestion, currentResponse, '', normalize(currentTheme));
  }, 1800 + Math.random() * 800);
}

function rate(nota) {
  if (rated) return;
  rated = true;

  document.querySelectorAll('.star').forEach((s, i) => {
    s.classList.toggle('selected', i < nota);
  });

  if (!currentIsPair) {
    saveWeight(currentTheme, currentRespIdx, nota);
  }

  submitForm(currentQuestion, currentResponse, nota, normalize(currentTheme));
  document.getElementById('sent-msg').hidden = false;
}

function newQuestion() {
  document.getElementById('question').value = '';
  show('screen-input');
  document.getElementById('question').focus();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey &&
      document.getElementById('screen-input') &&
      !document.getElementById('screen-input').hidden) {
    e.preventDefault();
    consult();
  }
});
</script>
