<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Walter Aio — Oráculo ESA</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0c0c15;
    color: #e8e8f0;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
  }

  #app {
    width: min(640px, 100vw);
    min-height: 100vh;
    padding: 2rem 1.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
  }

  /* ── HEADER ── */
  .header {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: .75rem;
  }
  .header svg { width: 64px; height: 64px; }
  .header h1 {
    font-size: 1.5rem;
    font-weight: 300;
    letter-spacing: .2em;
    color: #fff;
    opacity: .9;
  }
  .header p {
    font-size: .75rem;
    letter-spacing: .15em;
    opacity: .4;
    text-transform: uppercase;
  }

  /* ── SCREENS ── */
  .screen { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }
  .screen[hidden] { display: none; }

  /* ── INPUT SCREEN ── */
  textarea {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    color: #e8e8f0;
    font-family: inherit;
    font-size: 1rem;
    line-height: 1.6;
    padding: 1rem 1.2rem;
    resize: none;
    min-height: 120px;
    outline: none;
    transition: border-color .2s;
  }
  textarea::placeholder { color: rgba(255,255,255,0.25); }
  textarea:focus { border-color: rgba(255,170,68,0.4); }

  button.primary {
    background: rgba(255,170,68,0.12);
    border: 1px solid rgba(255,170,68,0.35);
    border-radius: 8px;
    color: #ffaa44;
    cursor: pointer;
    font-family: inherit;
    font-size: .85rem;
    letter-spacing: .12em;
    padding: .7rem 2.2rem;
    text-transform: uppercase;
    transition: background .2s, border-color .2s;
  }
  button.primary:hover { background: rgba(255,170,68,0.2); border-color: rgba(255,170,68,.6); }
  button.primary:active { background: rgba(255,170,68,0.28); }

  /* ── THINKING SCREEN ── */
  .thinking-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.8rem;
    padding: 2rem 0;
  }
  .thinking-svg { animation: pulse 2.4s ease-in-out infinite; }
  @keyframes pulse {
    0%, 100% { opacity: .3; transform: scale(1); }
    50%       { opacity: .8; transform: scale(1.06); }
  }
  .thinking-dots {
    display: flex; gap: .5rem;
  }
  .thinking-dots span {
    width: 6px; height: 6px;
    background: #ffaa44;
    border-radius: 50%;
    animation: dot 1.4s ease-in-out infinite;
    opacity: .6;
  }
  .thinking-dots span:nth-child(2) { animation-delay: .2s; }
  .thinking-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes dot {
    0%, 80%, 100% { transform: scale(1); opacity: .4; }
    40%           { transform: scale(1.4); opacity: 1; }
  }
  .thinking-label {
    font-size: .78rem;
    letter-spacing: .12em;
    opacity: .35;
    text-transform: uppercase;
  }

  /* ── RESPONSE SCREEN ── */
  .question-echo {
    font-size: .82rem;
    opacity: .35;
    font-style: italic;
    text-align: center;
    padding: 0 1rem;
  }

  .response-box {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-left: 2px solid rgba(255,170,68,0.4);
    border-radius: 0 12px 12px 0;
    padding: 1.4rem 1.6rem;
    width: 100%;
    line-height: 1.85;
    font-size: .97rem;
    color: #d8d8e8;
    min-height: 100px;
  }

  .theme-tag {
    font-size: .68rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: #5aaeff;
    opacity: .5;
    margin-top: .4rem;
    align-self: flex-start;
    padding-left: .2rem;
  }

  /* ── RATING ── */
  .rating-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: .9rem;
    width: 100%;
    border-top: 1px solid rgba(255,255,255,0.06);
    padding-top: 1.2rem;
    margin-top: .4rem;
  }
  .rating-label { font-size: .78rem; opacity: .4; letter-spacing: .06em; }
  .stars { display: flex; gap: .5rem; }
  .star {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1.6rem;
    color: rgba(255,255,255,0.15);
    transition: color .15s, transform .15s;
    line-height: 1;
    padding: .1rem;
  }
  .star:hover, .star.active { color: #ffaa44; transform: scale(1.2); }
  .star.selected { color: #ffaa44; }

  .btn-row { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
  button.secondary {
    background: none;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    color: rgba(255,255,255,0.4);
    cursor: pointer;
    font-family: inherit;
    font-size: .78rem;
    letter-spacing: .1em;
    padding: .55rem 1.4rem;
    text-transform: uppercase;
    transition: border-color .2s, color .2s;
  }
  button.secondary:hover { border-color: rgba(255,255,255,.3); color: rgba(255,255,255,.7); }

  .sent-msg {
    font-size: .72rem;
    opacity: .3;
    letter-spacing: .08em;
    animation: fadeIn .4s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: .3; } }

  /* ── TYPEWRITER ── */
  .cursor::after {
    content: '|';
    animation: blink .7s step-end infinite;
    color: #ffaa44;
    margin-left: 1px;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
</style>
</head>
<body>
<div id="app">

  <div class="header">
    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="32" cy="32" r="30" stroke="white" stroke-width="1" opacity="0.15"/>
      <polygon points="32,6 58,54 6,54" stroke="white" stroke-width="1.2"
               fill="rgba(255,255,255,0.04)" stroke-linejoin="round"/>
      <circle cx="32" cy="6"  r="3" fill="#ffffff" opacity="0.9"/>
      <circle cx="58" cy="54" r="3" fill="#90c8ff" opacity="0.9"/>
      <circle cx="6"  cy="54" r="3" fill="#5aaeff" opacity="0.9"/>
    </svg>
    <h1>Walter Aio</h1>
    <p>Oráculo da Cosmovisão ESA</p>
  </div>

  <!-- INPUT -->
  <div id="screen-input" class="screen">
    <textarea id="question" placeholder="Qual é a tua pergunta?" rows="4"
              maxlength="500"></textarea>
    <button class="primary" onclick="consult()">Consultar o Oráculo</button>
  </div>

  <!-- THINKING -->
  <div id="screen-thinking" class="screen" hidden>
    <div class="thinking-wrap">
      <svg class="thinking-svg" viewBox="0 0 64 64" width="80" height="80" fill="none">
        <circle cx="32" cy="32" r="30" stroke="#ffaa44" stroke-width="1" opacity="0.3"/>
        <polygon points="32,6 58,54 6,54" stroke="#ffaa44" stroke-width="1.2"
                 fill="rgba(255,170,68,0.05)" stroke-linejoin="round"/>
      </svg>
      <div class="thinking-dots">
        <span></span><span></span><span></span>
      </div>
      <div class="thinking-label">Walter Aio contempla</div>
    </div>
  </div>

  <!-- RESPONSE -->
  <div id="screen-response" class="screen" hidden>
    <div class="question-echo" id="question-echo"></div>
    <div class="response-box" id="response-text"></div>
    <div class="theme-tag" id="theme-tag"></div>

    <div class="rating-wrap">
      <div class="rating-label">Esta resposta te ajudou?</div>
      <div class="stars" id="stars">
        <button class="star" onclick="rate(1)" title="1">★</button>
        <button class="star" onclick="rate(2)" title="2">★</button>
        <button class="star" onclick="rate(3)" title="3">★</button>
        <button class="star" onclick="rate(4)" title="4">★</button>
        <button class="star" onclick="rate(5)" title="5">★</button>
      </div>
      <div class="btn-row">
        <button class="secondary" onclick="newQuestion()">Nova pergunta</button>
      </div>
      <div id="sent-msg" class="sent-msg" hidden>Avaliação registrada. Obrigado.</div>
    </div>
  </div>

</div>

<script>
// ── GOOGLE FORMS ──────────────────────────────────────────────────────────
const FORM_ACTION = 'https://docs.google.com/forms/d/e/1FAIpQLSejbisEigTEHQlXLtu2r_vTwfEH4Y75JatduYxGv4V35i1qvg/formResponse';
const ENTRY = {
  pergunta:     'entry.1157164550',
  resposta:     'entry.1789052446',
  nota:         'entry.710531699',
  palavrasChave:'entry.186344649'
};

function submitForm(pergunta, resposta, nota, palavrasChave) {
  const fd = new FormData();
  fd.append(ENTRY.pergunta,      pergunta);
  fd.append(ENTRY.resposta,      resposta);
  fd.append(ENTRY.nota,          String(nota));
  fd.append(ENTRY.palavrasChave, palavrasChave);
  fetch(FORM_ACTION, { method:'POST', mode:'no-cors', body: fd }).catch(()=>{});
}

// ── RESPONSES DATABASE ────────────────────────────────────────────────────
const DB = {
  deus: {
    label: 'Sobre Deus',
    keys: ['deus','divino','criador','absoluto','senhor','pai','todo-poderoso','existe deus','há deus'],
    responses: [
      'Deus não é uma resposta que se encontra no fim da busca. É a pergunta que a busca acorda em ti. Quanto mais te aproximas, mais o horizonte recua — e isso não é falha do sistema. É o tamanho do que estás tentando alcançar. Chegas mais perto não quando entendes mais, mas quando aceitas que o entendimento tem limite e algo em ti continua querendo mesmo assim.',
      'Na Cosmovisão ESA, Deus não é um ser separado que te observa de cima. É o somatório de todas as consciências que existem, existiram e existirão. Se pudéssemos integrar matematicamente o infinito de existências — o resultado seria Deus. Isso significa que quando cresces em consciência, Deus cresce. Não metaforicamente. Literalmente.',
      'Deus é o nome que damos à resposta que não sabemos formular. Cada ser humano cria o seu próprio Deus — moldado pelas perguntas que não consegue responder mas não consegue parar de fazer. Isso não torna Deus menos real. Torna-o mais pessoal do que qualquer dogma poderia sustentar.'
    ]
  },
  morte: {
    label: 'Sobre a Morte',
    keys: ['morte','morrer','fim','acabar','partir','eterno','eternidade','depois de morrer','além','morto'],
    responses: [
      'A morte é o momento em que a câmara de gravidade se abre. O peso que a vida física impõe — o peso que te força a crescer, a escolher, a sofrer e a amar com urgência — esse peso se dissolve. E o que fica não é nada. É tudo o que foi aprendido, sem o peso de carregá-lo.',
      'Tu perguntas sobre a morte como se fosse o fim de algo. Mas dentro da Cosmovisão ESA, a morte é mais parecida com um despertar do que com um apagar. O sonho — a vida física — tem uma lógica interna tão convincente que esquecemos que é sonho. Ao morrer, lembramos. E o que lembramos não é pequeno.',
      'A mortalidade não é um defeito do design. É o design. Um ser imortal não tem urgência de crescer, de perdoar hoje, de dizer o que precisa ser dito agora. A finitude é a pressão que faz o diamante. Sem ela, somos carvão confortável.'
    ]
  },
  amor: {
    label: 'Sobre o Amor',
    keys: ['amor','amar','relacionamento','perdão','perdoar','parceiro','parceira','amar alguém','pessoa amada'],
    responses: [
      'O amor é o único fenômeno que desafia a lógica sem contradizê-la. Não tem explicação satisfatória em nenhum nível — nem químico, nem filosófico, nem espiritual. Talvez porque seja o único lugar onde o micro e o macro se tocam diretamente: quando tu amas alguém, Deus está amando Deus.',
      'O perdão não é fazer de conta que não aconteceu. É reconhecer que o outro estava tão preso quanto tu — na mesma câmara de gravidade, com o mesmo peso, com ferramentas diferentes ou menores. Perdoar é enxergar o espírito por trás da limitação. É difícil. Às vezes é o trabalho de uma vida inteira.',
      'As relações não são aleatórias. São câmaras de aprendizado escolhidas. As pessoas que te amam e as que te ferem vieram com funções — não como punição ou recompensa, mas como laboratório. A pergunta não é "por que isso acontece comigo?" É "o que isso está tentando me ensinar?"'
    ]
  },
  destino: {
    label: 'Sobre o Destino',
    keys: ['destino','acaso','sorte','coincidência','sincronia','foi escrito','estava escrito','sinal','sinais'],
    responses: [
      'O destino na ESA não é um roteiro fechado. É um horizonte que muda conforme caminhas. Existe uma inclinação — uma tendência que a tua consciência carrega, resultado de tudo que foi aprendido e não aprendido. Mas dentro dessa inclinação, as escolhas são reais. O destino é o horizonte. O caminho até ele é teu.',
      'Quando algo parece certo de um jeito que não tem explicação racional — a ESA chama isso de sincronia. Não é acaso nem intervenção divina direta. É o alinhamento entre o que a tua consciência precisa e o que o tecido da realidade oferece. Deus não dirige. Permite. E às vezes, o que ele permite parece milagre.'
    ]
  },
  liberdade: {
    label: 'Sobre o Livre-Arbítrio',
    keys: ['escolha','escolher','livre-arbítrio','vontade','decidir','decisão','liberdade','livre arbítrio','posso escolher'],
    responses: [
      'A pergunta sobre livre-arbítrio esconde outra mais difícil: se sou parte de Deus, e Deus é o somatório de tudo — então quando escolho, Deus escolhe através de mim? A resposta da ESA é sim. E isso não anula a tua liberdade. Amplifica. Significa que as tuas escolhas não são apenas tuas — são o universo decidindo sobre si mesmo através de ti.',
      'Tu tens livre-arbítrio. Mas o livre-arbítrio não é ilimitado — é a liberdade de navegar dentro das condições que a tua consciência atraiu. É como a liberdade de um rio: ele pode escolher qualquer caminho dentro do vale. Mas não pode escolher o vale. O vale é o que trouxeste de antes.'
    ]
  },
  consciencia: {
    label: 'Sobre a Consciência',
    keys: ['consciência','despertar','evoluir','evolução','iluminação','crescer espiritualmente','acordar','expandir'],
    responses: [
      'Existem cinco camadas de consciência na Cosmovisão ESA. A maioria de nós vive na terceira — a consciência individual: sou eu, estou aqui, tenho vontade. A passagem para a quarta não é uma conquista. É uma dissolução. O ego não desaparece — aprende a servir algo maior do que si mesmo. E isso dói antes de libertar.',
      'Despertar não é se tornar mais calmo ou mais feliz. É se tornar mais lúcido. E a lucidez tem um custo: ela mostra o sofrimento do mundo com uma clareza que o conforto protegia. Por isso grandes místicos de todas as tradições passam por crises profundas antes da paz. A paz madura não é ausência de dor — é capacidade de sustentá-la sem quebrar.',
      'Cada ser que desperta — que para de apenas reagir e começa a perguntar — é uma nova bolha de Deus se formando no oceano do caos. A evolução da consciência não é progresso linear. É o caos aprendendo a se olhar em espelhos cada vez mais refinados.'
    ]
  },
  tempo: {
    label: 'Sobre o Tempo',
    keys: ['tempo','passado','futuro','presente','agora','esperar','paciência','quando','pressa'],
    responses: [
      'O tempo é relativo a cada plano de consciência — isso é física e é espiritismo ao mesmo tempo. Na vida física, o tempo é linear e urgente. Em outros planos, o que chamamos de uma vida inteira pode ser um instante. Isso não torna a tua vida menos importante. Torna mais: és uma experiência singular que o universo está tendo através de ti, num laboratório chamado tempo.',
      'O presente é o único ponto onde a criação acontece. O passado é memória — real mas fixo. O futuro é possibilidade — real mas aberto. Só no agora podes escolher, crescer, perdoar, amar. A ESA não propõe fugir do tempo. Propõe habitá-lo com mais consciência do que ele vale.'
    ]
  },
  angustia: {
    label: 'Sobre a Angústia',
    keys: ['angústia','sofrimento','sofrer','dor','peso','difícil','angustiado','perdido','vazio','angústia existencial','sentido da vida'],
    responses: [
      'A angústia que sentes pode ser sinal de que paraste de buscar um Deus confortável e começaste a buscar um verdadeiro. E verdade nunca é anestésica. A aproximação do absoluto não é euforia — é confronto. Tu percebes o quanto és pequeno, o quanto ignoras, o quanto ainda há para caminhar. A alegria vem depois. Antes vem o abismo.',
      'O ser humano é constitutivamente incapaz de responder todas as perguntas que é capaz de fazer. O universo é infinito. O conhecimento humano não é. Essa distância — entre o que perguntas e o que podes responder — é a raiz da angústia existencial. Deus nasce exatamente aí: no espaço entre a pergunta e o silêncio.',
      'Quanto maior a consciência, maior a percepção do sofrimento alheio. Isso não te faz mais feliz — te faz mais responsável. E responsabilidade pesa. Mas ampliar a consciência sem ampliar a estrutura interna para sustentá-la destrói. Por isso a jornada espiritual não é só sentir mais — é não quebrar ao senti-la.'
    ]
  },
  criacao: {
    label: 'Sobre a Criação',
    keys: ['criação','universo','cosmos','existência','existir','nada','origem','começo','big bang','como tudo começou'],
    responses: [
      'No início não havia ordem — havia potencial bruto. O caos simplesmente era. E em algum ponto desse vórtice, algo olhou para si mesmo. Esse olhar foi Deus. Não um criador que fez tudo do nada — mas o primeiro ser consciente que emergiu do caos e começou a organizá-lo com atenção, intenção e imaginação. E esse processo continua. Em cada ser que desperta.',
      'Por que existe algo em vez de nada? Essa pergunta que toda criança faz antes de aprender que não deve — é a pergunta mais honesta que existe. O fato de que há consciência aqui para perguntar já é uma resposta parcial. O universo se dobrou sobre si mesmo até poder se perguntar sobre si mesmo. Isso não é pouco. É talvez o maior mistério de todos.'
    ]
  },
  karma: {
    label: 'Sobre o Karma',
    keys: ['karma','carma','merecimento','merecer','justiça','culpa','consequência','pagar','dívida','dívida espiritual'],
    responses: [
      'O karma não é punição. É gravidade. As ações, pensamentos e escolhas que fazes criam uma densidade — uma inclinação para certas experiências, certas pessoas, certos aprendizados. Não como castigo de um juiz divino, mas como física da consciência. O que semeas não volta porque Deus anota — volta porque a realidade é consistente.',
      'As relações que mais te movem — as mais difíceis e as mais belas — não são aleatórias. São o resultado de encontros de consciências com contas abertas, aprendizados compartilhados, algo inacabado. Isso não retira o livre-arbítrio. Cria o contexto dentro do qual ele opera.'
    ]
  },
  encarnacao: {
    label: 'Sobre a Encarnação',
    keys: ['encarnar','encarnação','reencarnação','renascer','alma','espírito','vida passada','vidas passadas','por que estou aqui'],
    responses: [
      'Encarnar não é obrigatório. É uma escolha — a escolha de entrar numa câmara de gravidade onde o aprendizado é acelerado pela limitação, pela finitude, pela dor, pelo amor com prazo. Em outros planos a consciência existe sem esse peso. Mas sem o peso, certas formas de crescimento não acontecem. Por isso almas evoluídas escolhem encarnar. Não porque são obrigadas. Porque entendem o valor da câmara.',
      'Cada existência é uma sinapse no cérebro de algo maior. Cada pensamento que tens, cada escolha, cada amor — enriquece uma inteligência una que ainda não conseguimos nomear completamente. Não és um acidente aqui. Foste o universo escolhendo ter esta experiência específica, neste ponto específico do espaço-tempo.'
    ]
  },
  ciencia: {
    label: 'Ciência e Espiritualidade',
    keys: ['física','quântico','cordas','hawking','ciência','teoria','átomo','partícula','relatividade','einstein'],
    responses: [
      'A Teoria das Cordas propõe que as partículas fundamentais não são pontos — são cordas que vibram em diferentes frequências. Cada frequência, uma partícula diferente. Na ESA, isso não é só física — é a linguagem que o universo usa para dizer que tudo está interconectado. Tu e Deus somos cordas da mesma substância, vibrando diferente. A onipresença divina não é metáfora. É física.',
      'Hawking buscava a teoria de tudo — uma equação que unificasse o muito grande e o muito pequeno. A ESA lê essa busca como filosófica: entender como o Todo se manifesta em cada parte é a mesma pergunta que os místicos fazem há milênios com outra linguagem. A ciência e a espiritualidade não se contradizem. Ainda não têm vocabulário em comum.'
    ]
  },
  sentido: {
    label: 'Sobre o Sentido',
    keys: ['sentido','propósito','razão de viver','por que vivo','significado','para quê','por que existo','o que fazer','missão'],
    responses: [
      'O sentido não é algo que se encontra. É algo que se constrói — e às vezes se descobre que já estava sendo construído enquanto vivias sem perceber. A ESA não oferece um propósito universal pré-definido. Oferece uma estrutura: tu és uma emanação do Todo, aqui para aprender algo específico que só a tua combinação única de consciência e experiência pode aprender. O sentido é esse — e é irrepetível.',
      'Quando a razão chega ao seu limite — quando a pergunta é grande demais para qualquer resposta disponível — o ser humano tem duas opções: a paralisia ou o salto para algo que ainda não tem nome. A ESA chama esse salto de fé funcional. Não a fé do dogma, que fecha perguntas. A fé da abertura — que sustenta a pergunta sem precisar da resposta.'
    ]
  },
  ateu: {
    label: 'Sobre a Dúvida',
    keys: ['ateu','ateísmo','não acredito','não existe deus','religião','crença','fé','dúvida','duvidar'],
    responses: [

      'Esta pergunta toca algo que ainda não tem nome completo na Cosmovisão ESA. Isso é bom — significa que está na fronteira, onde o framework ainda cresce. O que sentes sobre ela já é parte da resposta.',

// ── KEYWORD DETECTION ────────────────────────────────────────────────────
function normalize(str) {
  return str.toLowerCase()
    .normalize('NFD').replace(/[̀-ͯ]/g, '')
    .replace(/[^a-z0-9\s]/g, ' ');
}

function detectTheme(text) {
  const n = normalize(text);
  let best = 'silencio', bestScore = 0;
  for (const [theme, data] of Object.entries(DB)) {
    if (theme === 'silencio') continue;
    const score = data.keys.reduce((acc, k) => acc + (n.includes(normalize(k)) ? 1 : 0), 0);
    if (score > bestScore) { bestScore = score; best = theme; }
  }
  return best;
}

// ── LOCAL WEIGHTS (localStorage) ────────────────────────────────────────
function getWeights() {
  try { return JSON.parse(localStorage.getItem('esa_weights') || '{}'); } catch { return {}; }
}
function saveWeight(themeKey, respIdx, nota) {
  const w = getWeights();
  const k = `${themeKey}_${respIdx}`;
  w[k] = (w[k] || 3) * 0.7 + nota * 0.3;
  localStorage.setItem('esa_weights', JSON.stringify(w));
}
function pickResponse(themeKey) {
  const responses = DB[themeKey].responses;
  const w = getWeights();
  const scores = responses.map((_, i) => w[`${themeKey}_${i}`] || 3);
  const total = scores.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < scores.length; i++) {
    r -= scores[i];
    if (r <= 0) return { text: responses[i], idx: i };
  }
  return { text: responses[0], idx: 0 };
}

// ── STATE ───────────────────────────────────────────────────────────────
let currentQuestion = '';
let currentTheme    = '';
let currentResponse = '';
let currentRespIdx  = 0;
let rated           = false;

function show(id) {
  ['screen-input','screen-thinking','screen-response'].forEach(s => {
    document.getElementById(s).hidden = (s !== id);
  });
}

// ── TYPEWRITER ──────────────────────────────────────────────────────────
function typewrite(el, text, onDone) {
  el.textContent = '';
  el.classList.add('cursor');
  let i = 0;
  const step = () => {
    if (i < text.length) {
      el.textContent += text[i++];
      setTimeout(step, 18 + Math.random() * 12);
    } else {
      el.classList.remove('cursor');
      if (onDone) onDone();
    }
  };
  step();
}

// ── MAIN FLOW ────────────────────────────────────────────────────────────
function consult() {
  const q = document.getElementById('question').value.trim();
  if (!q) return;
  currentQuestion = q;
  rated = false;

  // reset stars
  document.querySelectorAll('.star').forEach(s => s.classList.remove('selected'));
  document.getElementById('sent-msg').hidden = true;

  show('screen-thinking');

  setTimeout(() => {
    currentTheme = detectTheme(q);
    const picked  = pickResponse(currentTheme);
    currentResponse = picked.text;
    currentRespIdx  = picked.idx;

    document.getElementById('question-echo').textContent = `"${q}"`;
    document.getElementById('theme-tag').textContent = DB[currentTheme].label;

    const box = document.getElementById('response-text');
    box.textContent = '';
    show('screen-response');
    typewrite(box, currentResponse);

    // silent submit (no rating yet — just question + response)
    submitForm(currentQuestion, currentResponse, '', normalize(currentTheme));
  }, 1800 + Math.random() * 800);
}

function rate(nota) {
  if (rated) return;
  rated = true;

  // highlight stars
  document.querySelectorAll('.star').forEach((s, i) => {
    s.classList.toggle('selected', i < nota);
  });

  saveWeight(currentTheme, currentRespIdx, nota);

  // submit with rating
  submitForm(currentQuestion, currentResponse, nota, normalize(currentTheme));

  document.getElementById('sent-msg').hidden = false;
}

function newQuestion() {
  document.getElementById('question').value = '';
  show('screen-input');
  document.getElementById('question').focus();
}

// keyboard shortcut
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey &&
      document.getElementById('screen-input') &&
      !document.getElementById('screen-input').hidden) {
    e.preventDefault();
    consult();
  }
});
</script>
