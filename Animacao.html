<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<title>Cosmovisão ESA</title>
<style>
  body {
    background: #0c0c15;
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    color: #fff;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial;
    user-select: none;
  }
  svg { width: min(84vmin, 740px); height: auto; }
  #cap {
    font-size: clamp(.65rem, 1.6vw, .84rem);
    opacity: .52;
    min-height: 1.6em;
    margin-top: .5rem;
    letter-spacing: .05em;
    text-align: center;
    padding: 0 1rem;
  }
</style>
</head>
<body>
<svg id="svg" viewBox="-1.65 -1.65 3.3 3.3">
  <circle id="refCirc" cx="0" cy="0" r="1"
    fill="none" stroke="#fff" stroke-width="0.013" opacity="0.18"/>
  <polygon id="poly" points=""
    fill="rgba(255,255,255,0.05)" stroke="#fff" stroke-width="0.024"
    stroke-linejoin="round" stroke-linecap="round"/>
  <g id="dots"></g>
  <g id="lbls" fill="#fff" text-anchor="middle" dominant-baseline="middle"
    font-family="ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Arial"></g>
  <text x="0" y="0.08" text-anchor="middle" dominant-baseline="middle"
    font-size="0.11" font-weight="700" fill="#fff" opacity="0.28"
    letter-spacing="0.03em"
    font-family="ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Arial">
    Cosmovisão ESA
  </text>
</svg>
<div id="cap">Triângulo base: Alfa, Beta e Gama</div>

<script>
const TAU = Math.PI * 2;

// Point i out of n on the unit circle, clockwise from top, SVG coords (y down)
function circ(i, n) {
  const a = Math.PI / 2 - (i / n) * TAU;
  return { x: Math.cos(a), y: -Math.sin(a) };
}

// Labels in order for each generation's polygon
const GEN_LABELS = [
  ['Alfa', 'Beta', 'Gama'],
  ['Alfa', 'αβ', 'Beta', 'βγ', 'Gama', 'αγ'],
  ['Alfa','αβ₁','αβ','αβ₂','Beta','βγ₁','βγ','βγ₂','Gama','αγ₁','αγ','αγ₂'],
];

// Which generation point i first appeared in, within a gen-k polygon of n=3*2^k pts
function pointGen(i, k) {
  if (i === 0) return 0;
  const n = 3 * Math.pow(2, k);
  for (let g = 0; g <= k; g++) {
    const step = n / (3 * Math.pow(2, g));
    const prev  = g === 0 ? Infinity : n / (3 * Math.pow(2, g - 1));
    if (i % step === 0 && i % prev !== 0) return g;
  }
  return k;
}

// Build static point list for generation k
function buildGen(k) {
  const n = 3 * Math.pow(2, k);
  return Array.from({ length: n }, (_, i) => {
    const p = circ(i, n);
    return {
      ...p,
      gen:   pointGen(i, k),
      label: k <= 2 ? (GEN_LABELS[k][i] ?? null) : null,
    };
  });
}

// Interpolated polygon: t=0 → gen k, t=1 → gen k+1
// New midpoints start at chord midpoint and bulge out to circle
function morphPts(k, t) {
  const src = buildGen(k);
  const dst = buildGen(k + 1);
  const n   = src.length;
  const out = [];
  for (let i = 0; i < n; i++) {
    out.push(src[i]);
    const next = src[(i + 1) % n];
    const cx = (src[i].x + next.x) / 2;
    const cy = (src[i].y + next.y) / 2;
    const gx = dst[2 * i + 1].x;
    const gy = dst[2 * i + 1].y;
    out.push({ x: cx + t * (gx - cx), y: cy + t * (gy - cy), gen: k + 1, label: null });
  }
  return out;
}

// DOM
const polyEl = document.getElementById('poly');
const dotsEl = document.getElementById('dots');
const lblsEl = document.getElementById('lbls');
const capEl  = document.getElementById('cap');
const refEl  = document.getElementById('refCirc');

const DOT_R   = [0.044, 0.031, 0.023, 0.017, 0.012, 0.009, 0.007];
const DOT_CLR = ['#ffffff', '#90c8ff', '#5aaeff', '#3a8fdd', '#2868cc', '#1a55aa', '#0f4088'];
const FONT_SZ = [0.115,  0.086,  0.070,  0,      0,      0,      0     ];
const LBL_D   = 1.20;

const MAX_GEN  = 5;
const T_HOLD   = 1200;
const T_MORPH  = 750;
const T_CIRCLE = 1800;
const SEG      = T_HOLD + T_MORPH;
const TOTAL    = SEG * MAX_GEN + T_HOLD + T_CIRCLE;

const CAPTS = [
  'Triângulo base: Alfa, Beta e Gama',
  'Pontos intermediários: αβ, βγ, αγ — hexágono',
  'Segunda camada: αβ₁, αβ₂, βγ₁, βγ₂, αγ₁, αγ₂',
  'Terceira subdivisão — 24 vértices',
  'Quarta subdivisão — 48 vértices',
  'Quinta subdivisão — 96 vértices',
  'O círculo se forma — o conhecimento sem fronteiras',
];

function ease(t) { return t < .5 ? 2*t*t : -1 + (4 - 2*t)*t; }
function fmt(n)  { return n.toFixed(5); }

function setPoly(pts) {
  polyEl.setAttribute('points', pts.map(p => `${fmt(p.x)},${fmt(p.y)}`).join(' '));
}

function setDots(pts) {
  dotsEl.innerHTML = '';
  pts.forEach(p => {
    const g = Math.min(p.gen, DOT_R.length - 1);
    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    c.setAttribute('cx', fmt(p.x));
    c.setAttribute('cy', fmt(p.y));
    c.setAttribute('r', DOT_R[g]);
    c.setAttribute('fill', DOT_CLR[g]);
    dotsEl.appendChild(c);
  });
}

function setLabels(pts, fadeInGen, fadeT) {
  lblsEl.innerHTML = '';
  const n = pts.length;
  pts.forEach((p, i) => {
    if (!p.label) return;
    const fs = FONT_SZ[Math.min(p.gen, FONT_SZ.length - 1)];
    if (!fs) return;
    const a  = Math.PI / 2 - (i / n) * TAU;
    const lx = Math.cos(a) * LBL_D;
    const ly = -Math.sin(a) * LBL_D;
    const op = (fadeInGen >= 0 && p.gen === fadeInGen) ? fadeT : 1;
    const t  = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t.setAttribute('x', fmt(lx));
    t.setAttribute('y', fmt(ly));
    t.setAttribute('font-size', fmt(fs));
    t.setAttribute('opacity', op.toFixed(3));
    t.setAttribute('fill', DOT_CLR[Math.min(p.gen, DOT_CLR.length - 1)]);
    t.textContent = p.label;
    lblsEl.appendChild(t);
  });
}

function stateHold(k) {
  if (capEl.textContent !== CAPTS[k]) capEl.textContent = CAPTS[k];
  polyEl.style.opacity = '';
  refEl.setAttribute('opacity', '0.18');
  const pts = buildGen(k);
  setPoly(pts);
  setDots(pts);
  setLabels(pts, -1, 1);
}

function stateMorph(k, t) {
  const cap = t < .5 ? CAPTS[k] : CAPTS[k + 1];
  if (capEl.textContent !== cap) capEl.textContent = cap;
  polyEl.style.opacity = '';
  refEl.setAttribute('opacity', '0.18');
  const pts = morphPts(k, t);
  setPoly(pts);
  setDots(pts);
  // Labels at final (circle) positions, new gen fades in
  setLabels(buildGen(k + 1), k + 1, t);
}

function stateCircle(t) {
  if (capEl.textContent !== CAPTS[MAX_GEN + 1]) capEl.textContent = CAPTS[MAX_GEN + 1];
  const e = ease(Math.min(t, 1));
  polyEl.style.opacity = Math.max(0, 1 - e * 2).toFixed(3);
  refEl.setAttribute('opacity', (0.18 + e * 0.65).toFixed(3));
  if (e > 0.5) { dotsEl.innerHTML = ''; lblsEl.innerHTML = ''; }
}

let t0 = null;
function frame(ts) {
  if (t0 === null) t0 = ts;
  const el = (ts - t0) % TOTAL;

  if (el < SEG * MAX_GEN + T_HOLD) {
    const k       = Math.min(Math.floor(el / SEG), MAX_GEN);
    const local   = el - k * SEG;
    if (local < T_HOLD) {
      stateHold(k);
    } else if (k < MAX_GEN) {
      stateMorph(k, ease((local - T_HOLD) / T_MORPH));
    } else {
      stateHold(k);
    }
  } else {
    stateCircle((el - SEG * MAX_GEN - T_HOLD) / T_CIRCLE);
  }

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
